const QuestionCard = memo(function QuestionCard({
  q, isCollapsed, isFav, isDone, isPinned, isWeak, srCard, isDue: due,
  displaySettings, searchQ, onToggleCollapse, onToggleFav, onToggleDone,
  onOpenNote, noteText, onOpenTag, customTag, compact, onTogglePin, collections,
  focused, onFocusClick, localAnsOverride, onToggleLocalAns,
  localOptOverride, onToggleLocalOpt, localExpOverride, onToggleLocalExp,
  bulkMode, isBulkSelected, onToggleBulk, onJumpTag, setQDifficulty, questionDifficulty, showToast, onCopyTags,
}) {
  const showAns  = localAnsOverride !== undefined ? localAnsOverride : displaySettings.showAnswer;
  const showOpts = localOptOverride  !== undefined ? localOptOverride : displaySettings.showOptions;
  const showExp  = localExpOverride  !== undefined ? localExpOverride : displaySettings.showExplanation;

  const [copied, setCopied] = useState(false);

  const copyCard = () => {
    let t = `Q${qNum(q.id)}: ${q.question}\n`;
    if (showOpts && q.options && q.options.length>0)
      q.options.forEach((o,i) => { t += `  ${String.fromCharCode(65+i)}) ${o}\n`; });
    if (showAns) t += `  ✓ ${q.answerKey?q.answerKey+' — ':''}${q.answerText}\n`;
    if (showExp && q.explanation) t += `  📖 ${q.explanation}\n`;
    navigator.clipboard?.writeText(t.trim()).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 1400);
    });
  };

  return (
    <div
      id={`q-${q.id}`}
      className={`q-card afu ${isDone?'done':''} ${isPinned&&!isDone?'pinned':''} ${isWeak&&!isDone&&!isPinned?'weak-card':''} ${isBulkSelected?'bulk-sel':''}`}
      style={{marginBottom:compact?6:12,outline:focused&&!bulkMode?'2px solid var(--primary)':'none',outlineOffset:2,cursor:bulkMode?'pointer':undefined}}
      onClick={bulkMode ? (e=>{e.stopPropagation();onToggleBulk(q.id);}) : onFocusClick}
    >
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,padding:compact?'10px 13px':'14px 16px',cursor:'pointer'}} onClick={()=>onToggleCollapse(q.id)}>
        <div style={{display:'flex',alignItems:'flex-start',gap:8,flex:1}}>
          {bulkMode && (
            <input type="checkbox" checked={!!isBulkSelected}
              onChange={e=>{e.stopPropagation();onToggleBulk(q.id);}}
              onClick={e=>e.stopPropagation()}
              style={{marginTop:3,width:15,height:15,flexShrink:0,accentColor:'var(--primary)',cursor:'pointer'}}/>
          )}
          <button onClick={e=>{e.stopPropagation();onToggleDone(q.id);}} style={{marginTop:2,flexShrink:0,background:'none',border:'none',cursor:'pointer',padding:0}} title="Mark done (D)">
            {isDone?<I.CheckCircle size={17}/>:<I.Circle size={17}/>}
          </button>
          <div style={{flex:1}}>
            {q.lesson&&q.lesson!=='General'&&<div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--muted)',marginBottom:3}}>{q.lesson.length>55?q.lesson.slice(0,55)+'…':q.lesson}</div>}
            <div style={{fontSize:compact?13:14,fontWeight:500,lineHeight:1.55,textDecoration:isDone?'line-through':'none',opacity:isDone?.7:1}}>
              {hl(q.question, searchQ)}
            </div>
          </div>
        </div>

        {/* Actions */}
        <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}} onClick={e=>e.stopPropagation()}>
          {/* SR indicator */}
          {due && <span className="tag-chip due" title="Due for review"><I.Zap/>Due</span>}
          {isWeak && <span className="tag-chip weak" title="Weak spot — answered wrong ≥3x">⚡</span>}
          {/* Options per-card toggle */}
          {q.options&&q.options.length>0&&(
            <button onClick={()=>onToggleLocalOpt(q.id)}
              title={`Options: ${localOptOverride===undefined?'global':localOptOverride?'shown':'hidden'}`}
              style={{padding:'3px 7px',borderRadius:6,border:`1px solid ${localOptOverride===true?'var(--primary)':localOptOverride===false?'var(--red)':'var(--border2)'}`,background:localOptOverride===true?'var(--pg)':localOptOverride===false?'var(--rg)':'var(--card2)',color:localOptOverride===true?'var(--primary)':localOptOverride===false?'var(--red)':'var(--muted)',cursor:'pointer',fontSize:10,fontFamily:'var(--mono)',fontWeight:700}}>
              {localOptOverride===false?<I.EyeOff/>:<I.Eye/>}{!compact&&<span style={{marginLeft:3}}>Opts</span>}
            </button>
          )}
          {/* Explanation per-card toggle */}
          {q.explanation&&(
            <button onClick={()=>onToggleLocalExp(q.id)}
              title={`Explanation: ${localExpOverride===undefined?'global':localExpOverride?'shown':'hidden'}`}
              style={{padding:'3px 7px',borderRadius:6,border:`1px solid ${localExpOverride===true?'var(--purple)':localExpOverride===false?'var(--red)':'var(--border2)'}`,background:localExpOverride===true?'var(--pug)':localExpOverride===false?'var(--rg)':'var(--card2)',color:localExpOverride===true?'var(--purple)':localExpOverride===false?'var(--red)':'var(--muted)',cursor:'pointer',fontSize:10,fontFamily:'var(--mono)',fontWeight:700}}>
              {localExpOverride===false?<I.EyeOff/>:<I.Eye/>}{!compact&&<span style={{marginLeft:3}}>Exp</span>}
            </button>
          )}
          {/* Answer per-card toggle */}
          <button onClick={()=>onToggleLocalAns(q.id)}
            title={`Answer: ${localAnsOverride===undefined?'global':localAnsOverride?'shown':'hidden'} (A)`}
            style={{padding:'3px 7px',borderRadius:6,border:`1px solid ${localAnsOverride===true?'var(--green)':localAnsOverride===false?'var(--red)':'var(--border2)'}`,background:localAnsOverride===true?'var(--gg)':localAnsOverride===false?'var(--rg)':'var(--card2)',color:localAnsOverride===true?'var(--green)':localAnsOverride===false?'var(--red)':'var(--muted)',cursor:'pointer',fontSize:10,fontFamily:'var(--mono)',fontWeight:700}}>
            {localAnsOverride===false?<I.EyeOff/>:<I.Eye/>}{!compact&&<span style={{marginLeft:3}}>{localAnsOverride===true?'✓':localAnsOverride===false?'✗':'Ans'}</span>}
          </button>
          {/* Copy card */}
          <button onClick={copyCard} title="Copy question to clipboard"
            style={{padding:'3px 6px',borderRadius:6,border:`1px solid ${copied?'var(--green)':'var(--border2)'}`,background:copied?'var(--gg)':'var(--card2)',color:copied?'var(--green)':'var(--muted)',cursor:'pointer',display:'flex',alignItems:'center',gap:3,lineHeight:1,transition:'background .2s,border-color .2s,color .2s',animation:copied?'copyPop .35s ease-out':'none',position:'relative',minWidth:28,justifyContent:'center'}}>
            {copied ? <span style={{fontSize:11,fontWeight:800,animation:'fadeCheck 1.4s ease-out forwards'}}>✓</span> : <I.Copy/>}
          </button>
          <button onClick={()=>onOpenNote(q.id)} title="Note (N)" style={{background:noteText?'var(--pg)':'none',border:'none',cursor:'pointer',padding:'4px 6px',borderRadius:6,color:noteText?'var(--primary)':'var(--muted)'}}><I.Note/></button>
          <button onClick={()=>onToggleFav(q.id)} title="Favorite (F)" style={{background:'none',border:'none',cursor:'pointer',padding:'4px 6px',borderRadius:6}}><I.Star f={isFav}/></button>
          <button onClick={()=>onTogglePin(q.id)} title="Pin (P)" style={{background:isPinned?'var(--yg)':'none',border:isPinned?'1px solid var(--yellow)':'1px solid transparent',cursor:'pointer',padding:'3px 6px',borderRadius:6,color:isPinned?'var(--yellow)':'var(--muted)'}}><I.Pin/></button>
          {/* Difficulty selector */}
          <div style={{display:'flex',gap:2,padding:'0 2px'}}>
            {['easy','medium','hard'].map(level=>(
              <button key={level} onClick={(e)=>{e.stopPropagation();setQDifficulty(q.id,level);showToast(`Marked as ${level}`)}}
                title={`Mark as ${level}`}
                style={{fontSize:9,padding:'2px 4px',borderRadius:4,border:'1px solid',borderColor:questionDifficulty[q.id]===level?'var(--primary)':'var(--border2)',background:questionDifficulty[q.id]===level?'var(--pg)':'var(--card2)',color:questionDifficulty[q.id]===level?'var(--primary)':'var(--muted)',cursor:'pointer',fontWeight:500}}>
                {level[0].toUpperCase()}
              </button>
            ))}
          </div>
          <span className="id-badge">{q.id}</span>
          <div style={{color:'var(--muted)',padding:'2px 4px'}}>{isCollapsed?<I.Cd/>:<I.Cu/>}</div>
        </div>
      </div>

      {/* Body */}
      {!isCollapsed && (
        <div style={{borderTop:'1px solid var(--border)',padding:compact?'8px 13px 12px':'12px 16px 16px'}} className="afi">
          {/* Options */}
          {showOpts&&q.options&&q.options.length>0&&(
            <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:8}}>
              {q.options.map((opt,i)=>{
                const char=String.fromCharCode(65+i);
                const isCorrect=q.answerKey&&char===q.answerKey;
                return (
                  <div key={i} className={`opt-row ${showAns&&isCorrect?'correct':''}`} style={{fontSize:compact?12:13}}>
                    <span style={{fontWeight:700,minWidth:18,fontFamily:'var(--mono)',fontSize:11}}>{char}.</span>
                    <span style={{flex:1,lineHeight:1.5}}>{hl(opt,searchQ)}</span>
                    {showAns&&isCorrect&&<I.Check/>}
                  </div>
                );
              })}
            </div>
          )}

          {/* Answer text */}
          {showAns&&q.answerText&&(!showOpts||!q.options||q.options.length===0)&&(
            <div style={{background:'var(--gg)',border:'1px solid var(--green)',borderRadius:8,color:'var(--green)',padding:'7px 12px',fontSize:compact?12:13,display:'flex',gap:8,alignItems:'flex-start',marginBottom:8}}>
              <I.Check/><span><b>Answer:</b> {q.answerKey?q.answerKey+' — ':''}{hl(q.answerText,searchQ)}</span>
            </div>
          )}

          {/* Explanation */}
          {showExp&&q.explanation&&(
            <div style={{borderLeft:'3px solid var(--primary)',paddingLeft:10,marginBottom:8,fontSize:compact?11:12,color:'var(--muted)',lineHeight:1.6}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:2,color:'var(--primary)'}}>Explanation</div>
              {hl(q.explanation,searchQ)}
            </div>
          )}

          {/* Tags & meta row */}
          <div style={{display:'flex',flexWrap:'wrap',gap:6,alignItems:'center'}}>
            {displaySettings.showTags && (q.tags && q.tags.length > 0 || customTag) && (()=>{
              const tags = customTag ? [customTag] : (q.tags || []);
              return (
                <>
                  {tags.map((tag, idx) => (
                    <span key={idx} className="tag-chip" style={{cursor:'pointer',padding:0,overflow:'hidden'}}>
                      <span
                        onClick={e=>{e.stopPropagation();onJumpTag&&onJumpTag(tag);}}
                        title={`Filter by tag: ${tag}`}
                        style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 6px 3px 9px',cursor:'pointer'}}>
                        <I.Tag/>{tag}
                      </span>
                      <span
                        onClick={e=>{e.stopPropagation();onCopyTags?.(q.tags);showToast(`Copied ${q.tags?.length||0} tag${q.tags?.length!==1?'s':''}`)}}
                        title="Copy tags"
                        style={{display:'inline-flex',alignItems:'center',padding:'3px 5px 3px 4px',borderLeft:'1px solid var(--border2)',color:'var(--muted)',fontSize:10,cursor:'pointer',opacity:.7}}
                      >📋</span>
                      <span
                        onClick={e=>{e.stopPropagation();onOpenTag(q.id);}}
                        title="Edit tags"
                        style={{display:'inline-flex',alignItems:'center',padding:'3px 7px 3px 4px',borderLeft:'1px solid var(--border2)',color:'var(--muted)',fontSize:10,cursor:'pointer',opacity:.7}}
                      >✎</span>
                    </span>
                  ))}
                </>
              );
            })()}
            {!q.tags?.length && !customTag && (
              <button onClick={e=>{e.stopPropagation();onOpenTag(q.id);}} className="tag-chip" style={{cursor:'pointer',color:'var(--muted)',fontSize:10}}>+ tag</button>
            )}
            {/* SR info */}
            {srCard&&srCard.lastReviewed&&(
              <span style={{fontSize:10,color:'var(--muted)',fontFamily:'var(--mono)'}}>
                SR: {srCard.repetitions}×{' '}{srCard.interval}d
              </span>
            )}
            {/* Collections */}
            {collections.map(c=>(
              <span key={c.id} className="coll-badge" style={{color:c.color,borderColor:c.color,background:c.color+'18'}}><I.Folder/>{c.name}</span>
            ))}
          </div>

          {/* Note preview */}
          {noteText&&(
            <div style={{marginTop:8,padding:'5px 10px',background:'var(--card2)',borderRadius:6,fontSize:11,fontFamily:'var(--mono)',color:'var(--muted)',borderLeft:'2px solid var(--yellow)',cursor:'pointer'}} onClick={()=>onOpenNote(q.id)}>
              📝 {noteText.length>90?noteText.slice(0,90)+'…':noteText}
            </div>
          )}
        </div>
      )}
    </div>
  );
});

  );

function TagFilterPanel({ allTags, restTags, selectedTags, excludeTags = new Set(), onToggle, onToggleExclude = () => {}, onClear, questions, customTags, floatMode, showToast }) {
  const [q, setQ] = useState('');
  const [excludeMode, setExcludeMode] = useState(false); // ✓ NEW: Toggle between include/exclude
  const inputRef = useRef(null);
  useEffect(()=>{ setTimeout(()=>inputRef.current?.focus(), 50); }, []);

  // ✓ FIX: Count ALL tags including tags array, not just single tag field
  const tagCounts = useMemo(()=>{
    const m = {};
    questions.forEach(question=>{
      // Collect all tags: from q.tags array + custom tags
      const tagsSet = new Set();
      if (question.tags && Array.isArray(question.tags)) {
        question.tags.forEach(t => {
          if (t && t.trim()) tagsSet.add(t.trim());
        });
      }
      if (customTags[question.id]) {
        customTags[question.id].split('|').forEach(t => {
          if (t && t.trim()) tagsSet.add(t.trim());
        });
      }
      if (question.tag && question.tag.trim()) {
        tagsSet.add(question.tag.trim());
      }
      // Increment counts
      tagsSet.forEach(tag => {
        m[tag] = (m[tag] || 0) + 1;
      });
    });
    if (restTags && restTags.length > 0) {
      m['__REST__'] = restTags.reduce((acc, t) => acc + (m[t] || 0), 0);
    }
    return m;
  }, [questions, customTags, restTags]);

  const filtered = useMemo(()=>{
    if (!q.trim()) return allTags;
    const lo = q.toLowerCase();
    return allTags.filter(t => t==='__REST__' ? 'rest'.includes(lo) : t.toLowerCase().includes(lo));
  },[allTags, q]);

  const copyTagToClipboard = (tag, e) => {
    e.preventDefault();
    e.stopPropagation();
    const copyText = tag === '__REST__' ? `Rest (${restTags?.length || 0} misc)` : tag;
    navigator.clipboard.writeText(copyText).then(() => {
      if (showToast) showToast(`✓ Copied: ${copyText}`);
    }).catch(err => {
      console.error('Copy failed:', err);
      if (showToast) showToast(`Failed to copy`, 'error');
    });
  };

  return (
    <div style={{
      position: floatMode ? 'fixed' : 'absolute',
      top: floatMode ? 112 : 'calc(100% + 6px)',
      left: floatMode ? 'unset' : 0,
      width:340,
      background:'var(--card)',border:'1px solid var(--border2)',borderRadius:'var(--r)',
      boxShadow:'var(--shadowl)',zIndex:200,animation:'fadeUp .15s ease-out',
      overflow:'hidden'
    }}>
      {/* Search */}
      <div style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:6}}>
        <I.Search/>
        <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
          placeholder="Search tags…"
          style={{flex:1,background:'none',border:'none',outline:'none',fontSize:13,color:'var(--text)',fontFamily:'var(--font)'}}/>
        {q&&<button onClick={()=>setQ('')} style={{background:'none',border:'none',cursor:'pointer',color:'var(--muted)',padding:0,lineHeight:1}}><I.X s={12}/></button>}
        {/* ✓ NEW: Include/Exclude mode toggle */}
        <button onClick={() => setExcludeMode(!excludeMode)} 
          title={excludeMode ? "Click to INCLUDE tags" : "Click to EXCLUDE tags"}
          style={{background:'none',border:'1px solid var(--border)',borderRadius:'var(--rs)',cursor:'pointer',color:excludeMode?'var(--red)':'var(--primary)',padding:'2px 6px',fontSize:11,fontWeight:700}}>
          {excludeMode ? '🚫 Exclude' : '✓ Include'}
        </button>
      </div>

      {/* Selected/Excluded tags display */}
      {selectedTags.size > 0 && (
        <div style={{padding:'10px 12px', background:excludeMode?'rgba(220,38,38,0.1)':'var(--pg)', borderBottom:'2px solid '+(excludeMode?'var(--red)':'var(--primary)'), display:'flex', flexWrap:'wrap', gap:6, alignItems:'center'}}>
          <span style={{fontSize:10, fontWeight:700, color:excludeMode?'var(--red)':'var(--primary)', textTransform:'uppercase', letterSpacing:'0.5px'}}>
            {excludeMode ? '🚫 Exclude:' : '✓ Include:'}
          </span>
          {Array.from(selectedTags).map(tag => (
            <span key={tag} style={{background:excludeMode?'var(--red)':'var(--primary)', color:'#fff', padding:'4px 10px', borderRadius:'var(--rs)', fontSize:12, fontWeight:600, display:'flex', alignItems:'center', gap:4}}>
              {tag === '__REST__' ? `Rest (${restTags?.length || 0})` : tag}
              <button onClick={e => { e.stopPropagation(); excludeMode ? onToggleExclude(tag) : onToggle(tag); }} style={{background:'none', border:'none', color:'#fff', cursor:'pointer', fontSize:14, padding:0, lineHeight:1}}>×</button>
            </span>
          ))}
        </div>
      )}

      {/* Clear all */}
      {selectedTags.size>0&&(
        <div className="dd-item" onClick={() => { onClear(); setExcludeMode(false); }} style={{color:'var(--red)',fontWeight:700,borderBottom:'1px solid var(--border)',fontSize:12,cursor:'pointer'}}>✕ Clear all ({selectedTags.size})</div>
      )}

      {/* Scrollable list */}
      <div style={{maxHeight:280,overflowY:'auto'}}>
        {filtered.length===0&&<div style={{padding:'10px 14px',fontSize:12,color:'var(--muted)'}}>No matches</div>}
        {filtered.map(t=>{
          // ✓ NEW: Consider both include and exclude modes
          const active = excludeMode ? excludeTags.has(t) : selectedTags.has(t);
          const cnt = tagCounts[t]||0;
          const isRest = t==='__REST__';
          const label = isRest ? `Rest (${restTags?.length||0} misc)` : t;
          return (
            <div key={t} className="dd-item" onClick={()=> excludeMode ? onToggleExclude(t) : onToggle(t)}
              title={isRest ? `Tags >40 chars with 1 question:\n${(restTags||[]).slice(0,8).join('\n')}${restTags?.length>8?'\n…':''}` : t}
              style={{background: active ? (excludeMode ? 'rgba(220,38,38,0.2)' : 'var(--pg)') : undefined, display:'flex', alignItems:'center', gap:8, justifyContent:'space-between', paddingRight:8}}>
              <div style={{display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0}}>
                <input type="checkbox" checked={active} onChange={()=>{}}
                  style={{accentColor:excludeMode?'var(--red)':'var(--primary)',flexShrink:0}}/>
                <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                  color: active ? (excludeMode ? 'var(--red)' : 'var(--primary)') : undefined,
                  fontStyle: isRest ? 'italic' : undefined}}>
                  {label}
                </span>
                <span style={{fontSize:10,color:'var(--muted)',fontFamily:'var(--mono)',flexShrink:0}}>{cnt}</span>
              </div>
              {/* Copy individual tag button */}
              <button onClick={(e) => copyTagToClipboard(t, e)} 
                title="Copy this tag individually"
                style={{background:'none', border:'none', color:'var(--muted)', cursor:'pointer', padding:'2px 4px', fontSize:12, lineHeight:1, transition:'color .2s'}}
                onMouseEnter={e => e.target.style.color = 'var(--primary)'}
                onMouseLeave={e => e.target.style.color = 'var(--muted)'}
              >📋</button>
            </div>
          );
        })}

        {/* Rest info row */}
        {restTags&&restTags.length>0&&(
          <div style={{padding:'6px 14px',fontSize:10,color:'var(--muted)',
            borderTop:'1px solid var(--border)',lineHeight:1.5}}>
            <b>Rest</b> = {restTags.length} tag{restTags.length>1?'s':''} &gt;40 chars with 1 question
          </div>
        )}
      </div>
    </div>
  );
}
// ═══════════════════════════════ NARRATION MODE ═══════════════════════════════
function NarrationMode({ questions, displaySettings, onClose }) {
  const [idx, setIdx] = useState(0);
  const [speaking, setSpeaking] = useState(false);
  const [paused, setPaused] = useState(false);
  const [rate, setRate] = useState(1.0);
  const [pitch, setPitch] = useState(1.0);
  const [voices, setVoices] = useState([]);
  const [voiceIdx, setVoiceIdx] = useState(0);
  const [showAnswer, setShowAnswer] = useState(false);
  const [autoAdvance, setAutoAdvance] = useState(true);
  const [readOptions, setReadOptions] = useState(true);
  const [readAnswer, setReadAnswer] = useState(true);
  const [readExplanation, setReadExplanation] = useState(true);
  const uttRef = useRef(null);
  const synth = window.speechSynthesis;

  useEffect(() => {
    const load = () => {
      const v = synth.getVoices().filter(v => v.lang.startsWith('en'));
      setVoices(v);
    };
    load();
    synth.addEventListener('voiceschanged', load);
    return () => { synth.cancel(); synth.removeEventListener('voiceschanged', load); };
  }, []);

  const q = questions[idx];

  const buildScript = (q) => {
    let parts = [`Question ${idx + 1} of ${questions.length}. ${q.question}`];
    if (readOptions && q.options?.length) {
      parts.push('Options:');
      q.options.forEach((o, i) => parts.push(`${['A','B','C','D','E'][i]}. ${o}`));
    }
    if (readAnswer && displaySettings.showAnswer) {
      const ans = q.answerKey ? `${q.answerKey}. ${q.answerText || ''}` : (q.answerText || '');
      if (ans.trim()) parts.push(`Answer: ${ans}`);
    }
    if (readExplanation && displaySettings.showExplanation && q.explanation) {
      parts.push(`Explanation: ${q.explanation}`);
    }
    return parts.join('. ');
  };

  const speak = (text) => {
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = rate;
    utt.pitch = pitch;
    if (voices[voiceIdx]) utt.voice = voices[voiceIdx];
    utt.onstart  = () => setSpeaking(true);
    utt.onend    = () => {
      setSpeaking(false);
      if (autoAdvance && idx < questions.length - 1) {
        setTimeout(() => setIdx(i => i + 1), 800);
      }
    };
    utt.onerror  = () => setSpeaking(false);
    uttRef.current = utt;
    synth.speak(utt);
  };

  useEffect(() => {
    if (!q) return;
    setShowAnswer(false);
    speak(buildScript(q));
    return () => synth.cancel();
  }, [idx, rate, pitch, voiceIdx, readOptions, readAnswer, readExplanation]);

  const togglePause = () => {
    if (synth.paused) { synth.resume(); setPaused(false); }
    else              { synth.pause();  setPaused(true);  }
  };

  const go = (n) => { synth.cancel(); setIdx(i => Math.max(0, Math.min(questions.length-1, i+n))); };

  useEffect(() => {
    const fn = e => {
      if (e.key === 'Escape')      onClose();
      if (e.key === ' ')           { e.preventDefault(); togglePause(); }
      if (e.key === 'ArrowRight')  go(+1);
      if (e.key === 'ArrowLeft')   go(-1);
      if (e.key === 'r' || e.key==='R') speak(buildScript(q));
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [idx, rate, pitch, voiceIdx, paused, readOptions, readAnswer, readExplanation]);

  if (!q) return null;

  const pct = questions.length > 1 ? (idx / (questions.length - 1)) * 100 : 100;
  const isCorrect = (letter) => q.answerKey && q.answerKey.toUpperCase() === letter;

  const Slider = ({ label, val, min, max, step, onChange }) => (
    <div style={{ display:'flex', alignItems:'center', gap:8, fontSize:12 }}>
      <span style={{ color:'var(--muted)', minWidth:44 }}>{label}</span>
      <input type="range" min={min} max={max} step={step} value={val}
        onChange={e => onChange(parseFloat(e.target.value))}
        style={{ flex:1, accentColor:'var(--primary)' }}/>
      <span style={{ color:'var(--text)', fontFamily:'var(--mono)', minWidth:28 }}>{val.toFixed(1)}</span>
    </div>
  );

  return (
    <div className="narr-overlay" onClick={onClose}>
      <div className="narr-card" onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ fontWeight:800, fontSize:16, display:'flex', alignItems:'center', gap:8 }}>
            <span className={speaking && !paused ? 'narr-speaking' : ''}>🔊</span>
            Narration Mode
          </div>
          <button className="btn ghost" onClick={onClose}>✕</button>
        </div>

        {/* Progress */}
        <div>
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--muted)', marginBottom:5 }}>
            <span>Q{idx+1} of {questions.length}</span>
            <span>{Math.round(pct)}%</span>
          </div>
          <div className="narr-progress"><div className="narr-progress-fill" style={{ width:`${pct}%` }}/></div>
        </div>

        {/* Question */}
        <div className="narr-q">{q.question}</div>

        {/* Options */}
        {q.options?.length > 0 && (
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {q.options.map((opt, oi) => {
              const letter = String.fromCharCode(65+oi);
              return (
                <div key={oi} className={`narr-opt ${showAnswer && isCorrect(letter) ? 'correct' : ''}`}>
                  <span style={{ fontWeight:700, minWidth:20 }}>{letter})</span>
                  {opt}
                </div>
              );
            })}
          </div>
        )}

        {/* Reveal answer */}
        {!showAnswer ? (
          <button className="btn" style={{ alignSelf:'flex-start', fontSize:12 }} onClick={() => setShowAnswer(true)}>
            Show Answer
          </button>
        ) : (
          <div style={{ padding:'10px 14px', borderRadius:8, background:'var(--gg)', border:'1px solid var(--green)',
            color:'var(--green)', fontSize:13, fontWeight:600 }}>
            ✓ {q.answerKey ? `${q.answerKey} — ` : ''}{q.answerText}
            {q.explanation && <div style={{ marginTop:6, fontWeight:400, fontSize:12, color:'var(--text)' }}>{q.explanation}</div>}
          </div>
        )}

        {/* Controls */}
        <div style={{ display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
          <button className="btn" onClick={()=>go(-1)} disabled={idx===0} title="Previous (←)">◀</button>
          <button className="btn primary" onClick={togglePause} style={{ minWidth:90 }}>
            {paused ? '▶ Resume' : speaking ? '⏸ Pause' : '▶ Play'}
          </button>
          <button className="btn" onClick={()=>go(+1)} disabled={idx===questions.length-1} title="Next (→)">▶</button>
          <button className="btn" onClick={()=>speak(buildScript(q))} title="Repeat (R)">↺ Repeat</button>
          <div style={{ flex:1 }}/>
          <label style={{ display:'flex', alignItems:'center', gap:5, fontSize:12, cursor:'pointer', color:'var(--muted)' }}>
            <input type="checkbox" checked={autoAdvance} onChange={e=>setAutoAdvance(e.target.checked)} style={{accentColor:'var(--primary)'}}/>
            Auto-advance
          </label>
        </div>

        {/* Settings accordion */}
        <details style={{ fontSize:12 }}>
          <summary style={{ cursor:'pointer', color:'var(--muted)', fontWeight:600, listStyle:'none', display:'flex', alignItems:'center', gap:6 }}>
            ⚙ Voice Settings
          </summary>
          <div style={{ display:'flex', flexDirection:'column', gap:10, marginTop:12 }}>
            {voices.length > 0 && (
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ color:'var(--muted)', minWidth:44, fontSize:12 }}>Voice</span>
                <select value={voiceIdx} onChange={e=>setVoiceIdx(+e.target.value)}
                  style={{ flex:1, padding:'4px 8px', borderRadius:6, border:'1px solid var(--border2)',
                    background:'var(--card2)', color:'var(--text)', fontSize:12 }}>
                  {voices.map((v,i) => <option key={i} value={i}>{v.name}</option>)}
                </select>
              </div>
            )}
            <Slider label="Speed"  val={rate}  min={0.5} max={2.0} step={0.1} onChange={setRate}/>
            <Slider label="Pitch"  val={pitch} min={0.5} max={2.0} step={0.1} onChange={setPitch}/>
            <div style={{ display:'flex', gap:12, flexWrap:'wrap', marginTop:4 }}>
              {[['readOptions','Read options'],['readAnswer','Read answer'],['readExplanation','Read explanation']].map(([k,label])=>(
                <label key={k} style={{ display:'flex', alignItems:'center', gap:5, cursor:'pointer', color:'var(--muted)' }}>
                  <input type="checkbox" checked={k==='readOptions'?readOptions:k==='readAnswer'?readAnswer:readExplanation}
                    onChange={e => {
                      if (k==='readOptions') setReadOptions(e.target.checked);
                      else if (k==='readAnswer') setReadAnswer(e.target.checked);
                      else setReadExplanation(e.target.checked);
                    }} style={{accentColor:'var(--primary)'}}/>
                  {label}
                </label>
              ))}
            </div>
          </div>
        </details>

        <div style={{ fontSize:10, color:'var(--muted)', textAlign:'center' }}>
          Space = pause · ← → = navigate · R = repeat · Esc = close
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════ KNOWLEDGE MAP ═══════════════════════════════
function KnowledgeMap({ questions, completedIds, favIds, weakIds, customTags, onClose }) {
  const [view, setView] = useState('lessons'); // 'lessons' | 'tags'
  const [sortBy, setSortBy] = useState('completion'); // 'completion' | 'count' | 'name' | 'weak'
  const [hovered, setHovered] = useState(null);

  const lessonData = useMemo(() => {
    const map = {};
    questions.forEach(q => {
      const l = q.lesson || 'General';
      if (!map[l]) map[l] = { name:l, total:0, done:0, fav:0, weak:0 };
      map[l].total++;
      if (completedIds.has(q.id)) map[l].done++;
      if (favIds.has(q.id))       map[l].fav++;
      if (weakIds.has(q.id))      map[l].weak++;
    });
    return Object.values(map);
  }, [questions, completedIds, favIds, weakIds]);

  const tagData = useMemo(() => {
    const map = {};
    questions.forEach(q => {
      const raw = customTags[q.id] || q.tag || '';
      const tags = raw.split(/[,;|]+/).map(t=>t.trim()).filter(Boolean);
      (tags.length ? tags : ['(no tag)']).forEach(tag => {
        if (!map[tag]) map[tag] = { name:tag, total:0, done:0, fav:0, weak:0 };
        map[tag].total++;
        if (completedIds.has(q.id)) map[tag].done++;
        if (favIds.has(q.id))       map[tag].fav++;
        if (weakIds.has(q.id))      map[tag].weak++;
      });
    });
    return Object.values(map);
  }, [questions, completedIds, favIds, weakIds, customTags]);

  const data = view === 'lessons' ? lessonData : tagData;

  const sorted = useMemo(() => {
    const d = [...data];
    if (sortBy === 'completion') d.sort((a,b) => (b.done/b.total) - (a.done/a.total));
    else if (sortBy === 'count') d.sort((a,b) => b.total - a.total);
    else if (sortBy === 'name')  d.sort((a,b) => a.name.localeCompare(b.name));
    else if (sortBy === 'weak')  d.sort((a,b) => b.weak - a.weak);
    return d;
  }, [data, sortBy]);

  // Compute node sizes: min 80px, max 180px based on question count
  const maxCount = Math.max(...sorted.map(d=>d.total), 1);
  const nodeSize = (count) => Math.round(80 + (count / maxCount) * 100);

  // Color based on completion pct
  const nodeColor = (item) => {
    const pct = item.total > 0 ? item.done / item.total : 0;
    if (pct >= 0.9) return { bg:'rgba(62,207,142,.22)', border:'var(--green)', text:'var(--green)', glow:'rgba(62,207,142,.4)' };
    if (pct >= 0.6) return { bg:'rgba(91,141,238,.2)',  border:'var(--primary)', text:'var(--primary)', glow:'rgba(91,141,238,.35)' };
    if (pct >= 0.3) return { bg:'rgba(245,166,35,.18)', border:'var(--yellow)', text:'var(--yellow)', glow:'rgba(245,166,35,.3)' };
    return           { bg:'rgba(240,96,88,.15)',  border:'var(--red)',   text:'var(--red)',    glow:'rgba(240,96,88,.25)' };
  };

  const totals = { total: questions.length, done: completedIds.size, fav: favIds.size, weak: weakIds.size };

  useEffect(() => {
    const fn = e => { if (e.key==='Escape') onClose(); };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, []);

  return (
    <div className="kmap-overlay" onClick={onClose}>
      <div className="kmap-modal" onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{ padding:'20px 24px 0', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
          <div style={{ fontWeight:800, fontSize:17 }}>🗺️ Knowledge Map</div>
          <button className="btn ghost" onClick={onClose}>✕</button>
        </div>

        {/* Summary stats */}
        <div style={{ display:'flex', gap:10, padding:'14px 24px 0', flexShrink:0, flexWrap:'wrap' }}>
          {[
            { label:'Total',    val:totals.total, color:'var(--text)' },
            { label:'Done',     val:`${totals.done} (${Math.round(totals.done/Math.max(totals.total,1)*100)}%)`, color:'var(--green)' },
            { label:'Fav',      val:totals.fav, color:'var(--yellow)' },
            { label:'Weak',     val:totals.weak, color:'var(--red)' },
            { label: view==='lessons'?'Lessons':'Tags', val:sorted.length, color:'var(--primary)' },
          ].map(s => (
            <div key={s.label} style={{ background:'var(--card2)', border:'1px solid var(--border)', borderRadius:10,
              padding:'8px 16px', display:'flex', flexDirection:'column', gap:2 }}>
              <span style={{ fontSize:18, fontWeight:800, color:s.color }}>{s.val}</span>
              <span style={{ fontSize:10, color:'var(--muted)', fontWeight:600, textTransform:'uppercase' }}>{s.label}</span>
            </div>
          ))}
        </div>

        {/* Controls */}
        <div style={{ display:'flex', gap:10, padding:'12px 24px', flexShrink:0, flexWrap:'wrap', alignItems:'center' }}>
          <div style={{ display:'flex', gap:4 }}>
            {[['lessons','By Lesson'],['tags','By Tag']].map(([id,label])=>(
              <button key={id} onClick={()=>setView(id)}
                style={{ padding:'5px 14px', borderRadius:7, fontSize:12, fontWeight:700, cursor:'pointer',
                  border:`1px solid ${view===id?'var(--primary)':'var(--border2)'}`,
                  background:view===id?'var(--pg)':'var(--card2)',
                  color:view===id?'var(--primary)':'var(--muted)' }}>
                {label}
              </button>
            ))}
          </div>
          <div style={{ fontSize:11, color:'var(--muted)', marginLeft:4 }}>Sort:</div>
          {[['completion','% Done'],['count','Count'],['weak','Weak'],['name','A–Z']].map(([id,label])=>(
            <button key={id} onClick={()=>setSortBy(id)}
              style={{ padding:'4px 10px', borderRadius:6, fontSize:11, fontWeight:600, cursor:'pointer',
                border:`1px solid ${sortBy===id?'var(--primary)':'var(--border2)'}`,
                background:sortBy===id?'var(--pg)':'transparent',
                color:sortBy===id?'var(--primary)':'var(--muted)' }}>
              {label}
            </button>
          ))}

          {/* Legend */}
          <div style={{ marginLeft:'auto', display:'flex', gap:10, alignItems:'center' }}>
            {[['var(--green)','≥90%'],['var(--primary)','60–89%'],['var(--yellow)','30–59%'],['var(--red)','<30%']].map(([c,l])=>(
              <div key={l} style={{ display:'flex', alignItems:'center', gap:4, fontSize:10, color:'var(--muted)' }}>
                <div style={{ width:10, height:10, borderRadius:99, background:c }}/>
                {l}
              </div>
            ))}
          </div>
        </div>

        {/* Bubble grid */}
        <div style={{ flex:1, overflowY:'auto', padding:'8px 24px 24px' }}>
          <div style={{ display:'flex', flexWrap:'wrap', gap:14, justifyContent:'center', alignItems:'flex-end' }}>
            {sorted.map((item, i) => {
              const size  = nodeSize(item.total);
              const color = nodeColor(item);
              const pct   = item.total > 0 ? Math.round(item.done / item.total * 100) : 0;
              const isHov = hovered === item.name;
              return (
                <div key={item.name}
                  className="kmap-node"
                  style={{ width:size, height:size, background:color.bg, borderColor:color.border,
                    boxShadow: isHov ? `0 0 24px ${color.glow}, 0 8px 32px rgba(0,0,0,.3)` : '0 2px 12px rgba(0,0,0,.2)' }}
                  onMouseEnter={()=>setHovered(item.name)}
                  onMouseLeave={()=>setHovered(null)}
                  title={`${item.name}\n${item.done}/${item.total} done · ${item.weak} weak · ${item.fav} fav`}>

                  {/* Completion arc */}
                  <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%' }} viewBox={`0 0 ${size} ${size}`}>
                    <circle cx={size/2} cy={size/2} r={size/2-4} fill="none"
                      stroke={color.border} strokeWidth={3} strokeOpacity={.2}/>
                    <circle cx={size/2} cy={size/2} r={size/2-4} fill="none"
                      stroke={color.border} strokeWidth={3} strokeOpacity={.7}
                      strokeDasharray={`${2*Math.PI*(size/2-4)}`}
                      strokeDashoffset={`${2*Math.PI*(size/2-4)*(1-pct/100)}`}
                      strokeLinecap="round"
                      style={{ transform:'rotate(-90deg)', transformOrigin:`${size/2}px ${size/2}px` }}/>
                  </svg>

                  {/* Label */}
                  <div style={{ position:'relative', zIndex:1, display:'flex', flexDirection:'column',
                    alignItems:'center', justifyContent:'center', padding:8, textAlign:'center', gap:2 }}>
                    <div style={{ fontSize:Math.max(9, Math.min(13, size/10)), fontWeight:700, color:color.text,
                      lineHeight:1.2, wordBreak:'break-word', maxWidth:'90%' }}>
                      {item.name.length > 20 ? item.name.slice(0,18)+'…' : item.name}
                    </div>
                    <div style={{ fontSize:Math.max(10, Math.min(16, size/8)), fontWeight:800, color:'var(--text)' }}>
                      {pct}%
                    </div>
                    <div style={{ fontSize:9, color:'var(--muted)', lineHeight:1.2 }}>
                      {item.done}/{item.total}
                      {item.weak > 0 && <span style={{ color:'var(--red)' }}> · ⚡{item.weak}</span>}
                      {item.fav  > 0 && <span style={{ color:'var(--yellow)' }}> · ★{item.fav}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {sorted.length === 0 && (
            <div style={{ textAlign:'center', padding:60, color:'var(--muted)' }}>No data yet</div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════ TV LAUNCHER ═══════════════════════════════
function TVLauncher({ questions, collections, availableLessons, allTags, completedIds, favIds, weakIds,
                      tvHistory, onSaveHistory, onDeleteHistory, onRenameHistory, onStart, onClose }) {

  const defaultConfig = {
    name: 'TV Session',
    // Scope
    lessons: [],          // [] = all
    tags: [],             // [] = all
    qFilter: 'all',       // 'all'|'unsolved'|'done'|'fav'|'weak'
    searchWord: '',
    collectionId: null,
    randomize: true,
    maxQs: 0,             // 0 = no limit
    // Content shown per slide
    showQuestion: true,
    showOptions: true,
    showAnswer: true,
    showExplanation: true,
    // Timing (seconds)
    questionTime: 8,
    optionsTime: 5,
    answerTime: 6,
    explanationTime: 5,
    loop: false,
  };

  const [cfg, setCfg] = useState(defaultConfig);
  const [tab, setTab] = useState('settings'); // 'settings' | 'history'
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState('');

  const set = (k, v) => setCfg(p => ({...p, [k]: v}));

  const pool = useMemo(() => {
    let qs = [...questions];
    if (cfg.collectionId) {
      const col = collections.find(c => c.id === cfg.collectionId);
      if (col) qs = qs.filter(q => col.qIds.includes(q.id));
    }
    if (cfg.lessons.length > 0) qs = qs.filter(q => cfg.lessons.includes(q.lesson));
    if (cfg.tags.length > 0) qs = qs.filter(q => {
      const t = q.tag||''; return cfg.tags.some(tag => t.includes(tag));
    });
    if (cfg.searchWord.trim()) {
      const lo = cfg.searchWord.trim().toLowerCase();
      qs = qs.filter(q => [q.question,...(q.options||[]),q.answerText||'',q.explanation||''].join(' ').toLowerCase().includes(lo));
    }
    if (cfg.qFilter === 'unsolved') qs = qs.filter(q => !completedIds.has(q.id));
    else if (cfg.qFilter === 'done')    qs = qs.filter(q => completedIds.has(q.id));
    else if (cfg.qFilter === 'fav')     qs = qs.filter(q => favIds.has(q.id));
    else if (cfg.qFilter === 'weak')    qs = qs.filter(q => weakIds.has(q.id));
    if (cfg.randomize) qs = [...qs].sort(() => Math.random() - 0.5);
    if (cfg.maxQs > 0) qs = qs.slice(0, cfg.maxQs);
    return qs;
  }, [questions, collections, completedIds, favIds, weakIds, cfg]);

  const totalSeconds = useMemo(() => {
    let perQ = 0;
    if (cfg.showQuestion) perQ += cfg.questionTime;
    if (cfg.showOptions) perQ += cfg.optionsTime;
    if (cfg.showAnswer) perQ += cfg.answerTime;
    if (cfg.showExplanation) perQ += cfg.explanationTime;
    return pool.length * perQ;
  }, [pool, cfg]);

  const fmt = (s) => {
    if (s < 60) return `${s}s`;
    const m = Math.floor(s/60), sec = s%60;
    return sec > 0 ? `${m}m ${sec}s` : `${m}m`;
  };

  const handleStart = () => {
    if (!pool.length) return;
    const entry = { id: Date.now().toString(), name: cfg.name || 'TV Session', config: cfg, ts: Date.now() };
    onSaveHistory(entry);
    onStart({ questions: pool, config: cfg });
  };

  const loadHistory = (h) => {
    setCfg({ ...defaultConfig, ...h.config });
    setTab('settings');
  };

  const TagChip = ({ tag }) => (
    <button onClick={() => set('tags', cfg.tags.includes(tag) ? cfg.tags.filter(t=>t!==tag) : [...cfg.tags, tag])}
      style={{ padding:'3px 10px', borderRadius:99, fontSize:11, fontWeight:600, cursor:'pointer',
        border: `1px solid ${cfg.tags.includes(tag) ? 'var(--primary)' : 'var(--border2)'}`,
        background: cfg.tags.includes(tag) ? 'var(--pg)' : 'var(--card2)',
        color: cfg.tags.includes(tag) ? 'var(--primary)' : 'var(--muted)' }}>
      {tag}
    </button>
  );

  const TimeInput = ({ label, val, k }) => (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
      <span style={{ fontSize:10, color:'var(--muted)', fontWeight:600, textAlign:'center', lineHeight:1.2 }}>{label}</span>
      <input type="number" min={2} max={120} value={val} onChange={e=>set(k, Math.max(2,parseInt(e.target.value)||2))}
        style={{ width:56, textAlign:'center', padding:'5px 4px', borderRadius:6, border:'1px solid var(--border2)',
          background:'var(--card2)', color:'var(--text)', fontSize:14, fontWeight:700, fontFamily:'var(--mono)' }}/>
      <span style={{ fontSize:10, color:'var(--muted)' }}>sec</span>
    </div>
  );

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{ maxWidth:600 }}>
        {/* Header */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
          <div style={{ fontWeight:800, fontSize:17, display:'flex', alignItems:'center', gap:8 }}>
            📺
            <input value={cfg.name} onChange={e=>set('name',e.target.value)}
              style={{ background:'transparent', border:'none', outline:'none', fontWeight:800, fontSize:17,
                color:'var(--text)', fontFamily:'var(--font)', borderBottom:'1px dashed var(--border2)',
                paddingBottom:1, minWidth:60, maxWidth:220 }}
              placeholder="Session name…"/>
          </div>
          <button className="btn ghost" onClick={onClose}>✕</button>
        </div>

        {/* Tabs */}
        <div style={{ display:'flex', gap:2, borderBottom:'1px solid var(--border)', marginBottom:16 }}>
          {[['settings','⚙ Settings'],['history',`🕒 History (${tvHistory.length})`]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{ padding:'6px 14px', fontSize:12, fontWeight:700, border:'none', cursor:'pointer', background:'none',
                borderBottom: tab===id ? '2px solid var(--primary)' : '2px solid transparent',
                color: tab===id ? 'var(--primary)' : 'var(--muted)', marginBottom:-1 }}>
              {label}
            </button>
          ))}
        </div>

        {tab === 'settings' && (
          <div style={{ display:'flex', flexDirection:'column', gap:14 }}>

            {/* Question filter */}
            <div>
              <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'.08em', color:'var(--muted)', marginBottom:7 }}>Question Filter</div>
              <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:8 }}>
                {[['all','All'],['unsolved','○ Unsolved'],['done','✓ Done'],['fav','★ Fav'],['weak','⚡ Weak']].map(([id,label])=>(
                  <button key={id} onClick={()=>set('qFilter',id)}
                    style={{ padding:'4px 12px', borderRadius:6, fontSize:12, fontWeight:600, cursor:'pointer',
                      border:`1px solid ${cfg.qFilter===id?'var(--primary)':'var(--border2)'}`,
                      background:cfg.qFilter===id?'var(--pg)':'var(--card2)',
                      color:cfg.qFilter===id?'var(--primary)':'var(--muted)' }}>
                    {label}
                  </button>
                ))}
              </div>
              <input className="input" placeholder="Search word filter…" value={cfg.searchWord}
                onChange={e=>set('searchWord',e.target.value)} style={{ marginBottom:6 }}/>
            </div>

            {/* Lessons */}
            {availableLessons.length > 0 && (
              <div>
                <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'.08em', color:'var(--muted)', marginBottom:7 }}>
                  Lessons <span style={{fontWeight:400,textTransform:'none'}}>(empty = all)</span>
                </div>
                <div style={{ display:'flex', gap:5, flexWrap:'wrap', maxHeight:80, overflowY:'auto' }}>
                  {availableLessons.filter(l=>l&&l!=='General').map(l => (
                    <button key={l} onClick={()=>set('lessons', cfg.lessons.includes(l)?cfg.lessons.filter(x=>x!==l):[...cfg.lessons,l])}
                      style={{ padding:'3px 10px', borderRadius:99, fontSize:11, fontWeight:600, cursor:'pointer',
                        border:`1px solid ${cfg.lessons.includes(l)?'var(--green)':'var(--border2)'}`,
                        background:cfg.lessons.includes(l)?'var(--gg)':'var(--card2)',
                        color:cfg.lessons.includes(l)?'var(--green)':'var(--muted)' }}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Tags */}
            {(allTags?.tags||[]).filter(t=>t!=='__REST__').length > 0 && (
              <div>
                <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'.08em', color:'var(--muted)', marginBottom:7 }}>
                  Tags <span style={{fontWeight:400,textTransform:'none'}}>(empty = all)</span>
                </div>
                <div style={{ display:'flex', gap:5, flexWrap:'wrap', maxHeight:70, overflowY:'auto' }}>
                  {(allTags?.tags||[]).filter(t=>t!=='__REST__').map(t=><TagChip key={t} tag={t}/>)}
                </div>
              </div>
            )}

            {/* What to show per slide */}
            <div>
              <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'.08em', color:'var(--muted)', marginBottom:7 }}>Show Per Slide</div>
              <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                {[['showQuestion','❓ Question'],['showOptions','☑ Options'],['showAnswer','✓ Answer'],['showExplanation','📖 Explanation']].map(([k,label])=>(
                  <label key={k} style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 12px', borderRadius:8, cursor:'pointer',
                    border:`1px solid ${cfg[k]?'var(--primary)':'var(--border2)'}`,
                    background:cfg[k]?'var(--pg)':'var(--card2)', fontSize:12, fontWeight:600,
                    color:cfg[k]?'var(--primary)':'var(--muted)' }}>
                    <input type="checkbox" checked={cfg[k]} onChange={e=>set(k,e.target.checked)} style={{accentColor:'var(--primary)'}}/>
                    {label}
                  </label>
                ))}
              </div>
            </div>

            {/* Timing */}
            <div>
              <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'.08em', color:'var(--muted)', marginBottom:10 }}>
                Slide Duration (seconds)
              </div>
              <div style={{ display:'flex', gap:20, flexWrap:'wrap' }}>
                {cfg.showQuestion    && <TimeInput label="Question" val={cfg.questionTime}    k="questionTime"/>}
                {cfg.showOptions     && <TimeInput label="Options"  val={cfg.optionsTime}     k="optionsTime"/>}
                {cfg.showAnswer      && <TimeInput label="Answer"   val={cfg.answerTime}      k="answerTime"/>}
                {cfg.showExplanation && <TimeInput label="Explanation" val={cfg.explanationTime} k="explanationTime"/>}
              </div>
            </div>

            {/* Misc */}
            <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>
              <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:13, cursor:'pointer', color:'var(--text)' }}>
                <input type="checkbox" checked={cfg.randomize} onChange={e=>set('randomize',e.target.checked)} style={{accentColor:'var(--primary)'}}/>
                Randomize order
              </label>
              <label style={{ display:'flex', alignItems:'center', gap:6, fontSize:13, cursor:'pointer', color:'var(--text)' }}>
                <input type="checkbox" checked={cfg.loop} onChange={e=>set('loop',e.target.checked)} style={{accentColor:'var(--primary)'}}/>
                Loop
              </label>
              <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:13 }}>
                <span style={{color:'var(--muted)'}}>Max Qs:</span>
                <input type="number" min={0} value={cfg.maxQs} onChange={e=>set('maxQs',Math.max(0,parseInt(e.target.value)||0))}
                  style={{ width:60, textAlign:'center', padding:'4px', borderRadius:6, border:'1px solid var(--border2)',
                    background:'var(--card2)', color:'var(--text)', fontSize:13, fontFamily:'var(--mono)' }}/>
                <span style={{color:'var(--muted)',fontSize:11}}>(0=all)</span>
              </div>
            </div>

            {/* Summary + Start */}
            <div style={{ background:'var(--card2)', border:'1px solid var(--border2)', borderRadius:10, padding:'12px 16px',
              display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, flexWrap:'wrap' }}>
              <div>
                <div style={{ fontSize:14, fontWeight:700 }}>
                  {pool.length > 0 ? <><span style={{color:'var(--primary)',fontSize:20}}>{pool.length}</span> questions</> : <span style={{color:'var(--red)'}}>No questions match</span>}
                </div>
                {pool.length > 0 && (
                  <div style={{ fontSize:11, color:'var(--muted)', marginTop:2 }}>
                    Total runtime ~<strong style={{color:'var(--text)'}}>{fmt(totalSeconds)}</strong>
                  </div>
                )}
              </div>
              <button className="btn primary" style={{ fontSize:14, padding:'9px 24px' }}
                onClick={handleStart} disabled={pool.length === 0}>
                ▶ Start TV
              </button>
            </div>
          </div>
        )}

        {tab === 'history' && (
          <div style={{ minHeight:300 }}>
            {tvHistory.length === 0 ? (
              <div style={{ textAlign:'center', padding:60, color:'var(--muted)', fontSize:13 }}>
                No history yet. Run a TV session to save settings here.
              </div>
            ) : tvHistory.map(h => (
              <div key={h.id} style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 12px',
                background:'var(--card2)', border:'1px solid var(--border)', borderRadius:8, marginBottom:6 }}>
                {editingId === h.id ? (
                  <input autoFocus value={editName} onChange={e=>setEditName(e.target.value)}
                    onBlur={()=>{onRenameHistory(h.id,editName.trim()||h.name);setEditingId(null);}}
                    onKeyDown={e=>{if(e.key==='Enter'){onRenameHistory(h.id,editName.trim()||h.name);setEditingId(null);}if(e.key==='Escape')setEditingId(null);}}
                    style={{ flex:1, background:'var(--card)', border:'1px solid var(--primary)', borderRadius:5,
                      padding:'3px 8px', color:'var(--text)', fontSize:13, fontFamily:'var(--font)', outline:'none' }}/>
                ) : (
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:700, fontSize:13 }}>{h.name}</div>
                    <div style={{ fontSize:11, color:'var(--muted)' }}>
                      {new Date(h.ts).toLocaleString()} ·{' '}
                      {h.config?.qFilter||'all'} · {h.config?.lessons?.length>0?h.config.lessons.slice(0,2).join(', '):'all lessons'}
                    </div>
                  </div>
                )}
                <button className="tv-btn" style={{fontSize:11,padding:'4px 10px'}} onClick={()=>{setEditingId(h.id);setEditName(h.name);}} title="Rename">✎</button>
                <button className="btn primary" style={{fontSize:11,padding:'4px 10px'}} onClick={()=>loadHistory(h)}>Load</button>
                <button className="btn" style={{fontSize:11,padding:'4px 10px',color:'var(--red)',borderColor:'var(--red)'}} onClick={()=>onDeleteHistory(h.id)}>✕</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════ TV PLAYER ═══════════════════════════════
function TVPlayer({ session, favIds, completedIds, onToggleFav, onToggleDone, onClose }) {
  const { questions: deck, config: cfg } = session;

  const buildPhases = (q, cfg) => {
    const phases = [];
    if (cfg.showQuestion) phases.push({ type:'question', dur: cfg.questionTime });
    if (cfg.showOptions && q.options?.length > 0) phases.push({ type:'options', dur: cfg.optionsTime });
    if (cfg.showAnswer) phases.push({ type:'answer', dur: cfg.answerTime });
    if (cfg.showExplanation && q.explanation) phases.push({ type:'explanation', dur: cfg.explanationTime });
    if (phases.length === 0) phases.push({ type:'question', dur: cfg.questionTime || 8 });
    return phases;
  };

  const [qIdx, setQIdx]       = useState(0);
  const [phaseIdx, setPhaseIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(null);
  const [paused, setPaused]   = useState(false);
  const [done, setDone]       = useState(false);
  const [animKey, setAnimKey] = useState(0);
  const [fontSize, setFontSize] = useState(100); // percentage, 60–180
  const [localFavs, setLocalFavs]   = useState(() => new Set(favIds));
  const [localDone, setLocalDone]   = useState(() => new Set(completedIds));
  const [actionFlash, setActionFlash] = useState(null); // {text, color}
  const slideRef = useRef(null);

  const q     = deck[qIdx];
  const phases = useMemo(() => q ? buildPhases(q, cfg) : [], [qIdx]);
  const phase  = phases[phaseIdx];

  // Reset slide scroll + timer on phase/q change
  useEffect(() => {
    if (!phase) return;
    setTimeLeft(phase.dur);
    setAnimKey(k => k + 1);
    if (slideRef.current) slideRef.current.scrollTop = 0;
  }, [qIdx, phaseIdx]);

  // Countdown
  useEffect(() => {
    if (paused || done || timeLeft === null || timeLeft <= 0) {
      if (timeLeft === 0) advance();
      return;
    }
    const t = setTimeout(() => setTimeLeft(tl => tl - 1), 1000);
    return () => clearTimeout(t);
  }, [timeLeft, paused, done]);

  const flash = (text, color='#3ecf8e') => {
    setActionFlash({ text, color });
    setTimeout(() => setActionFlash(null), 1200);
  };

  const advance = () => {
    if (phaseIdx + 1 < phases.length) { setPhaseIdx(p => p + 1); }
    else if (qIdx + 1 < deck.length)  { setQIdx(i => i + 1); setPhaseIdx(0); }
    else if (cfg.loop)                 { setQIdx(0); setPhaseIdx(0); }
    else                               { setDone(true); }
  };

  const retreat = () => {
    if (phaseIdx > 0)    { setPhaseIdx(p => p - 1); }
    else if (qIdx > 0)   { setQIdx(i => i - 1); setPhaseIdx(0); }
  };

  const changeFontSize = (delta) => setFontSize(s => Math.min(180, Math.max(60, s + delta)));

  const toggleFav = () => {
    if (!q) return;
    onToggleFav(q.id);
    setLocalFavs(prev => { const n = new Set(prev); n.has(q.id) ? n.delete(q.id) : n.add(q.id); return n; });
    flash(localFavs.has(q.id) ? '★ Removed from Fav' : '★ Added to Fav', '#f5a623');
  };

  const toggleDone = () => {
    if (!q) return;
    onToggleDone(q.id);
    setLocalDone(prev => { const n = new Set(prev); n.has(q.id) ? n.delete(q.id) : n.add(q.id); return n; });
    flash(localDone.has(q.id) ? '○ Marked Unsolved' : '✓ Marked Done', '#3ecf8e');
  };

  // Keyboard shortcuts
  useEffect(() => {
    const fn = e => {
      if (e.key === 'Escape')                                 { onClose(); return; }
      if (e.key === ' ')                                      { e.preventDefault(); setPaused(p => !p); return; }
      if (e.key === 'ArrowRight' || e.key === 'l')           { advance(); return; }
      if (e.key === 'ArrowLeft'  || e.key === 'h')           { retreat(); return; }
      if (e.key === 'ArrowUp'    || e.key === '=')           { e.preventDefault(); changeFontSize(+10); return; }
      if (e.key === 'ArrowDown'  || e.key === '-')           { e.preventDefault(); changeFontSize(-10); return; }
      if (e.key === '0')                                      { setFontSize(100); return; }
      if (e.key === 'f' || e.key === 'F')                    { toggleFav(); return; }
      if (e.key === 'd' || e.key === 'D')                    { toggleDone(); return; }
      // Scroll slide content manually when paused
      if (e.key === 'PageDown' || e.key === 'j') {
        if (slideRef.current) slideRef.current.scrollTop += 120;
      }
      if (e.key === 'PageUp' || e.key === 'k') {
        if (slideRef.current) slideRef.current.scrollTop -= 120;
      }
    };
    window.addEventListener('keydown', fn);
    return () => window.removeEventListener('keydown', fn);
  }, [phaseIdx, qIdx, phases, deck, cfg, localFavs, localDone]);

  if (!q) return null;

  const totalPhases = deck.reduce((s, qq) => s + buildPhases(qq, cfg).length, 0);
  const donePhases  = deck.slice(0, qIdx).reduce((s, qq) => s + buildPhases(qq, cfg).length, 0) + phaseIdx;
  const overallPct  = totalPhases > 0 ? (donePhases / totalPhases) * 100 : 0;
  const phasePct    = phase && timeLeft !== null ? ((phase.dur - timeLeft) / phase.dur) * 100 : 0;

  const phaseLabels = { question:'Question', options:'Options', answer:'Answer', explanation:'Explanation' };
  const bgGradients = {
    question:    'radial-gradient(ellipse at 60% 40%, #0d1a3a 0%, #050a14 70%)',
    options:     'radial-gradient(ellipse at 40% 60%, #0a1a2a 0%, #050a14 70%)',
    answer:      'radial-gradient(ellipse at 50% 30%, #0a2a1a 0%, #050a14 70%)',
    explanation: 'radial-gradient(ellipse at 50% 70%, #1a0a2a 0%, #050a14 70%)',
  };

  const isFav  = localFavs.has(q.id);
  const isDone = localDone.has(q.id);
  const scale  = fontSize / 100;

  if (done) return (
    <div className="tv-overlay" style={{ alignItems:'center', justifyContent:'center', background:'#050a14' }}>
      <div style={{ textAlign:'center', color:'#fff', padding:40 }}>
        <div style={{ fontSize:64, marginBottom:20 }}>🎬</div>
        <div style={{ fontSize:36, fontWeight:800, marginBottom:12 }}>That's a wrap!</div>
        <div style={{ fontSize:18, color:'rgba(255,255,255,.5)', marginBottom:32 }}>{deck.length} questions covered</div>
        <div style={{ display:'flex', gap:12, justifyContent:'center' }}>
          <button className="tv-btn primary" onClick={()=>{setQIdx(0);setPhaseIdx(0);setDone(false);}}>↺ Replay</button>
          <button className="tv-btn" onClick={onClose}>✕ Close</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="tv-overlay">
      {/* Overall progress bar */}
      <div className="tv-progress-bar">
        <div className="tv-progress-fill" style={{ width:`${overallPct}%`, transition:'width .5s linear' }}/>
      </div>

      {/* Slide — scrollable */}
      <div ref={slideRef} className="tv-slide"
        style={{ background: bgGradients[phase?.type] || bgGradients.question, overflowY:'auto' }}
        key={animKey}>

        {/* Phase label top-center */}
        <div className="tv-phase-label">{phaseLabels[phase?.type] || ''}</div>

        {/* Status badges top-right */}
        <div style={{ position:'absolute', top:16, right:20, display:'flex', gap:8 }}>
          {isDone && <span style={{ fontSize:12, fontWeight:700, padding:'3px 8px', borderRadius:99,
            background:'rgba(62,207,142,.25)', color:'#3ecf8e', border:'1px solid #3ecf8e44' }}>✓ Done</span>}
          {isFav  && <span style={{ fontSize:12, fontWeight:700, padding:'3px 8px', borderRadius:99,
            background:'rgba(245,166,35,.25)', color:'#f5a623', border:'1px solid #f5a62344' }}>★ Fav</span>}
        </div>

        {/* Action flash overlay */}
        {actionFlash && (
          <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)',
            fontSize:28, fontWeight:800, color:actionFlash.color,
            background:'rgba(0,0,0,.7)', padding:'14px 32px', borderRadius:14,
            border:`2px solid ${actionFlash.color}44`, pointerEvents:'none',
            animation:'tvFadeIn .15s ease-out', whiteSpace:'nowrap', zIndex:10 }}>
            {actionFlash.text}
          </div>
        )}

        {/* Content wrapper with font scale */}
        <div style={{ width:'100%', maxWidth:860, display:'flex', flexDirection:'column', alignItems:'center',
          gap:0, paddingBottom:20 }}>

          {/* Q number + lesson */}
          <div className="tv-lesson" style={{ fontSize: `${13*scale}px` }}>
            Q{qNum(q.id)}{q.lesson && q.lesson !== 'General' ? ` · ${q.lesson}` : ''}
          </div>

          {/* Question text */}
          <div className="tv-q-text tv-anim" style={{ fontSize:`${Math.round(32*scale)}px` }} key={`q-${qIdx}`}>
            {q.question}
          </div>

          {/* Options */}
          {(phase?.type === 'options' || phase?.type === 'answer' || phase?.type === 'explanation') &&
            q.options?.length > 0 && (
            <div style={{ marginTop:20, width:'100%' }} className="tv-anim">
              {q.options.map((opt, oi) => {
                const letter = String.fromCharCode(65+oi);
                const isCorrect = q.answerKey && q.answerKey.toUpperCase() === letter;
                const showReveal = phase?.type === 'answer' || phase?.type === 'explanation';
                return (
                  <div key={oi} className={`tv-option ${showReveal ? (isCorrect?'reveal-correct':'reveal-wrong') : ''}`}
                    style={{ fontSize:`${Math.round(17*scale)}px`, marginBottom:`${8*scale}px` }}>
                    <span style={{ fontWeight:800, minWidth:`${28*scale}px`, fontSize:'inherit', flexShrink:0 }}>{letter})</span>
                    {opt}
                  </div>
                );
              })}
            </div>
          )}

          {/* Answer box (no options) */}
          {(phase?.type === 'answer' || phase?.type === 'explanation') && !q.options?.length && (
            <div className="tv-answer-box tv-anim" style={{ fontSize:`${Math.round(20*scale)}px`, marginTop:20 }}>
              ✓ {q.answerKey ? `${q.answerKey} — ` : ''}{q.answerText}
            </div>
          )}

          {/* Explanation */}
          {phase?.type === 'explanation' && q.explanation && (
            <div className="tv-explanation tv-anim" style={{ fontSize:`${Math.round(15*scale)}px`, marginTop:10 }}>
              {q.explanation}
            </div>
          )}
        </div>

        {/* Timer arc — bottom left */}
        <div style={{ position:'sticky', bottom:12, left:28, alignSelf:'flex-start', marginTop:'auto', flexShrink:0 }}>
          <svg width={44} height={44} viewBox="0 0 44 44">
            <circle cx={22} cy={22} r={18} fill="none" stroke="rgba(255,255,255,.12)" strokeWidth={3}/>
            <circle cx={22} cy={22} r={18} fill="none" stroke="var(--primary)" strokeWidth={3}
              strokeDasharray={`${2*Math.PI*18}`}
              strokeDashoffset={`${2*Math.PI*18*(1 - phasePct/100)}`}
              strokeLinecap="round"
              style={{ transform:'rotate(-90deg)', transformOrigin:'22px 22px', transition:'stroke-dashoffset 1s linear' }}/>
            <text x={22} y={27} textAnchor="middle" fill="rgba(255,255,255,.7)" fontSize={12} fontFamily="monospace" fontWeight={700}>
              {timeLeft}
            </text>
          </svg>
        </div>

        <div className="tv-slide-num">{qIdx+1} / {deck.length}</div>
      </div>

      {/* Phase progress dots */}
      <div style={{ display:'flex', justifyContent:'center', gap:8, padding:'7px 0', background:'rgba(0,0,0,.4)', flexShrink:0 }}>
        {phases.map((ph, i) => (
          <div key={i} onClick={()=>{setPhaseIdx(i); setTimeLeft(phases[i].dur);}}
            title={phaseLabels[ph.type]}
            style={{ width: i===phaseIdx?24:8, height:8, borderRadius:4, transition:'all .3s', cursor:'pointer',
              background: i < phaseIdx ? 'var(--green)' : i === phaseIdx ? 'var(--primary)' : 'rgba(255,255,255,.2)' }}/>
        ))}
      </div>

      {/* Controls bar */}
      <div className="tv-controls" style={{ gap:6 }}>
        {/* Nav */}
        <button className="tv-btn" onClick={retreat} title="Previous phase (← / h)">◀</button>
        <button className="tv-btn primary" onClick={()=>setPaused(p=>!p)} title="Play/Pause (Space)" style={{ minWidth:76 }}>
          {paused ? '▶ Play' : '⏸ Pause'}
        </button>
        <button className="tv-btn" onClick={advance} title="Next phase (→ / l)">▶</button>

        <div style={{ width:1, height:20, background:'rgba(255,255,255,.15)', margin:'0 4px' }}/>

        {/* Fav / Done */}
        <button className="tv-btn" onClick={toggleFav} title="Toggle Favourite (F)"
          style={{ color: isFav ? '#f5a623' : 'rgba(255,255,255,.5)',
                   borderColor: isFav ? '#f5a62366' : 'rgba(255,255,255,.15)',
                   background: isFav ? 'rgba(245,166,35,.15)' : undefined }}>
          {isFav ? '★' : '☆'} Fav
        </button>
        <button className="tv-btn" onClick={toggleDone} title="Toggle Done (D)"
          style={{ color: isDone ? '#3ecf8e' : 'rgba(255,255,255,.5)',
                   borderColor: isDone ? '#3ecf8e66' : 'rgba(255,255,255,.15)',
                   background: isDone ? 'rgba(62,207,142,.15)' : undefined }}>
          {isDone ? '✓' : '○'} Done
        </button>

        <div style={{ width:1, height:20, background:'rgba(255,255,255,.15)', margin:'0 4px' }}/>

        {/* Font size */}
        <button className="tv-btn" onClick={()=>changeFontSize(-10)} title="Smaller font (↓ / -)">A−</button>
        <span style={{ color:'rgba(255,255,255,.45)', fontSize:11, fontFamily:'var(--mono)', minWidth:36, textAlign:'center' }}>
          {fontSize}%
        </span>
        <button className="tv-btn" onClick={()=>changeFontSize(+10)} title="Larger font (↑ / =)">A+</button>
        <button className="tv-btn" onClick={()=>setFontSize(100)} title="Reset font size (0)"
          style={{ fontSize:10, padding:'6px 8px', color:'rgba(255,255,255,.35)' }}>reset</button>

        <div style={{ flex:1 }}/>

        {/* Phase + time info */}
        <div style={{ color:'rgba(255,255,255,.4)', fontSize:11, fontFamily:'var(--mono)' }}>
          {phaseLabels[phase?.type]} · {timeLeft}s
        </div>

        <div style={{ width:1, height:20, background:'rgba(255,255,255,.15)', margin:'0 4px' }}/>
        <button className="tv-btn" onClick={onClose} title="Exit (Esc)" style={{ color:'rgba(255,255,255,.4)' }}>✕ Exit</button>
      </div>
    </div>
  );
}

function ExamLauncher({ questions, collections, completedIds, wrongCounts, onStart, onClose }) {
  const [excludeSolved, setExcludeSolved] = useState(true);
  const [scopeMode, setScopeMode] = useState('all'); // 'all' | 'collection' | 'weak'
  const [selectedCollId, setSelectedCollId] = useState(collections[0]?.id || null);
  const [maxQs, setMaxQs] = useState(40);
  const [randomize, setRandomize] = useState(true);

  const weakIds = new Set(
    Object.entries(wrongCounts).filter(([,c])=>c>=3).map(([id])=>parseInt(id))
  );

  // Build candidate pool based on options
  const pool = useMemo(() => {
    let qs = questions.filter(q => q.options && q.options.length > 0);

    // Scope filter
    if (scopeMode === 'collection' && selectedCollId) {
      const col = collections.find(c => c.id === selectedCollId);
      if (col) qs = qs.filter(q => col.qIds.includes(q.id));
    } else if (scopeMode === 'weak') {
      qs = qs.filter(q => weakIds.has(q.id));
    }

    // Exclude solved
    if (excludeSolved) qs = qs.filter(q => !completedIds.has(q.id));

    return qs;
  }, [questions, collections, completedIds, excludeSolved, scopeMode, selectedCollId]);

  const finalPool = useMemo(() => {
    let qs = [...pool];
    if (randomize) qs = qs.sort(() => Math.random() - 0.5);
    return qs.slice(0, Math.max(1, maxQs));
  }, [pool, randomize, maxQs]);

  const allSolved = pool.length === 0 && excludeSolved;
  const noQuestions = pool.length === 0;

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:480}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontWeight:800,fontSize:17}}>📝 Exam Settings</div>
          <button className="btn ghost" onClick={onClose} style={{padding:"4px 8px"}}>✕</button>
        </div>

        {/* Scope */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:"var(--muted)",marginBottom:8}}>Question Scope</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {[
              {id:"all", label:"All questions", icon:"📚"},
              {id:"weak", label:"Weak spots only (wrong ≥3×)", icon:"⚡"},
              {id:"collection", label:"Specific collection", icon:"📁"},
            ].map(opt => (
              <label key={opt.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,border:`1px solid ${scopeMode===opt.id?"var(--primary)":"var(--border2)"}`,background:scopeMode===opt.id?"var(--pg)":"var(--card2)",cursor:"pointer",transition:"all .15s"}}>
                <input type="radio" name="scope" checked={scopeMode===opt.id} onChange={()=>setScopeMode(opt.id)} style={{accentColor:"var(--primary)"}}/>
                <span style={{fontSize:14}}>{opt.icon}</span>
                <span style={{fontSize:13,fontWeight:scopeMode===opt.id?600:400}}>{opt.label}</span>
              </label>
            ))}
          </div>

          {/* Collection picker */}
          {scopeMode==="collection" && collections.length > 0 && (
            <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:6}}>
              {collections.map(c => (
                <button key={c.id} onClick={()=>setSelectedCollId(c.id)}
                  style={{padding:"5px 10px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",
                    border:`1px solid ${selectedCollId===c.id?c.color:"var(--border2)"}`,
                    background:selectedCollId===c.id?c.color+"22":"var(--card2)",
                    color:selectedCollId===c.id?c.color:"var(--muted)"}}>
                  {c.name} <span style={{opacity:.6,fontSize:10}}>({c.qIds.length})</span>
                </button>
              ))}
            </div>
          )}
          {scopeMode==="collection" && collections.length === 0 && (
            <div style={{marginTop:8,fontSize:12,color:"var(--red)"}}>No collections yet — create one first.</div>
          )}
        </div>

        {/* Exclude solved */}
        <label style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,border:"1px solid var(--border2)",background:"var(--card2)",cursor:"pointer",marginBottom:16}}>
          <input type="checkbox" checked={excludeSolved} onChange={e=>setExcludeSolved(e.target.checked)} style={{accentColor:"var(--primary)",width:16,height:16}}/>
          <div>
            <div style={{fontSize:13,fontWeight:600}}>Exclude already-solved questions</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>
              {completedIds.size > 0
                ? `${completedIds.size} question${completedIds.size!==1?"s":""} marked Done globally`
                : "No questions marked Done yet"}
            </div>
          </div>
        </label>

        {/* Random + count */}
        <div style={{display:"flex",gap:10,marginBottom:20,alignItems:"center"}}>
          <label style={{display:"flex",alignItems:"center",gap:8,flex:1,padding:"9px 12px",borderRadius:8,border:"1px solid var(--border2)",background:"var(--card2)",cursor:"pointer"}}>
            <input type="checkbox" checked={randomize} onChange={e=>setRandomize(e.target.checked)} style={{accentColor:"var(--primary)"}}/>
            <span style={{fontSize:13,fontWeight:600}}>Randomize order</span>
          </label>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderRadius:8,border:"1px solid var(--border2)",background:"var(--card2)"}}>
            <span style={{fontSize:12,color:"var(--muted)",whiteSpace:"nowrap"}}>Max Qs:</span>
            <input type="number" value={maxQs} min={5} max={200} step={5}
              onChange={e=>setMaxQs(Math.max(5,Math.min(200,parseInt(e.target.value)||40)))}
              style={{width:56,background:"transparent",border:"none",outline:"none",fontFamily:"var(--mono)",fontSize:13,color:"var(--text)",fontWeight:700,textAlign:"center"}}/>
          </div>
        </div>

        {/* Preview count */}
        <div style={{padding:"10px 14px",borderRadius:8,border:"1px solid var(--border2)",background:"var(--card2)",marginBottom:16,fontSize:13}}>
          {allSolved ? (
            <span style={{color:"var(--green)",fontWeight:700}}>
              🎉 All questions in this scope are already solved! Uncheck "Exclude solved" to retry them.
            </span>
          ) : noQuestions ? (
            <span style={{color:"var(--red)",fontWeight:700}}>⚠ No questions available with these settings.</span>
          ) : (
            <span>
              <b style={{color:"var(--primary)",fontFamily:"var(--mono)",fontSize:15}}>{Math.min(finalPool.length, maxQs)}</b>
              <span style={{color:"var(--muted)"}}> question{finalPool.length!==1?"s":""} will be in this exam
              {pool.length > maxQs ? ` (${pool.length} available, capped at ${maxQs})` : ""}
              </span>
            </span>
          )}
        </div>

        <div style={{display:"flex",gap:10}}>
          <button className="btn" onClick={onClose} style={{flex:1}}>Cancel</button>
          <button className="btn primary" style={{flex:2}} disabled={noQuestions}
            onClick={()=>onStart(finalPool)}>
            Start Exam ({Math.min(finalPool.length, maxQs)} Qs) →
          </button>
        </div>
      </div>
    </div>
  );
}

    '#34d399','#f472b6','#60a5fa','#4ade80','#fb923c','#e879f9','#22d3ee','#a3e635',

  const buildSystemSets = (qs, lessons) => {
    // Set 1: per-lesson collections
    let pi = 0;
    const lessonColls = (lessons||[]).filter(l=>l&&l!=='General').map(l => ({
      id: 'ls-' + l.slice(0,30).replace(/[^a-zA-Z0-9]/g,'_'),
      name: l, color: PALETTE[pi++ % PALETTE.length],
      qIds: qs.filter(q=>q.lesson===l).map(q=>q.id)
    }));
    const generalQs = qs.filter(q=>!q.lesson||q.lesson==='General');
    if (generalQs.length) lessonColls.push({ id:'ls-General', name:'General', color:'#8892a4', qIds: generalQs.map(q=>q.id) });
    // Set 2: numeric 10 chunks
    const chunk = Math.ceil(qs.length/10);
    const numericColls = Array.from({length:10},(_,i)=>{
      const sl = qs.slice(i*chunk,(i+1)*chunk);
      if(!sl.length) return null;
      return { id:`num-${i}`, name:`Part ${i+1}`, color: PALETTE[(i*3+7)%PALETTE.length],
        qIds: sl.map(q=>q.id) };
    }).filter(Boolean);
    return [
      { id:'set-lessons', name:'By Lesson', type:'lesson', colls: lessonColls },
      { id:'set-numeric', name:'By Part (10)', type:'numeric', colls: numericColls },
    ];

    if (!isValidType) {
      showToast(`Please upload a .json or .txt file`, 'error');
      return;
    }

    const reader = new FileReader();
    reader.onload = e => {
      try {
        const fk = fileKeyFrom(file.name);
        setFileKey(fk);
        let parsed, lessons;
        
        // Try to parse as JSON first
        if (file.name.endsWith('.json')) {
