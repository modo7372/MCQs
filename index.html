      const border = { style:BorderStyle.SINGLE, size:1, color:GRAY };
      const borders = { top:border, bottom:border, left:border, right:border };
      const cellMarg = { top:80, bottom:80, left:120, right:120 };

      const titleLabel = activeCollId
        ? collections.find(c=>c.id===activeCollId)?.name
        : activeTab==='SR Due' ? 'SR Due' : (activeFile||'Export');

      // What sections are visible — mirrors displaySettings exactly like exportToText
      const showOpts = displaySettings.showOptions;
      const showAns  = displaySettings.showAnswer;
      const showExp  = displaySettings.showExplanation;
      const showTags = displaySettings.showTags;

      const children = [];

      // ── Title block ──
      children.push(new Paragraph({
        children:[new TextRun({text:`QnA Hub — ${titleLabel}`, bold:true, size:36, color:BLUE, font:'Arial'})],
        spacing:{after:120}
      }));
      const metaParts = [`${visibleQuestions.length} questions`, new Date().toLocaleDateString()];
      if (!showOpts)  metaParts.push('options hidden');
      if (!showAns)   metaParts.push('answers hidden');
      if (!showExp)   metaParts.push('explanations hidden');
      children.push(new Paragraph({
        children:[new TextRun({text:metaParts.join(' · '), size:18, color:'888888', font:'Arial'})],
        spacing:{after:400}
      }));

      visibleQuestions.forEach((q, qi) => {
        const isDoneQ   = completedIds.has(q.id);
        const isWeakQ   = weakIds.has(q.id);
        const isFavQ    = favIds.has(q.id);
        const tag       = customTags[q.id]||q.tag;
        const note      = notes[q.id];
        const qLabel    = `Q${qNum(q.id)}.`;

        // ── Question ──
        children.push(new Paragraph({
          children:[
            new TextRun({text:qLabel+' ', bold:true, size:24, color:BLUE, font:'Arial'}),
            new TextRun({text:q.question, bold:true, size:24, font:'Arial',
              color: isDoneQ?'22AA66': isWeakQ?'CC3333':'111111'}),
          ],
          spacing:{before:280, after:80},
          border:{ bottom:{style:BorderStyle.SINGLE, size:1, color:'DDDDDD', space:4} }
        }));

        // Lesson label (always shown — it's metadata not a toggle)
        if (q.lesson && q.lesson!=='General') {
          children.push(new Paragraph({
            children:[new TextRun({text:`${q.lesson}`, size:17, color:'777777', italics:true, font:'Arial'})],
            spacing:{after:60}
          }));
        }

        // ── Options ──
        if (showOpts && q.options && q.options.length > 0) {
          const rows = q.options.map((opt, oi) => {
            const letter = String.fromCharCode(65+oi);
            const isCorrect = showAns && q.answerKey && q.answerKey.toUpperCase()===letter;
            return new TableRow({ children:[
              new TableCell({
                borders, margins:cellMarg,
                width:{size:720, type:WidthType.DXA},
                shading: isCorrect ? {fill:'D5F0E8', type:ShadingType.CLEAR} : {},
                children:[new Paragraph({children:[new TextRun({text:letter+')', bold:true, size:20, font:'Arial', color:isCorrect?GREEN:'333333'})]})]
              }),
              new TableCell({
                borders, margins:cellMarg,
                width:{size:8640, type:WidthType.DXA},
                shading: isCorrect ? {fill:'D5F0E8', type:ShadingType.CLEAR} : {},
                children:[new Paragraph({children:[new TextRun({text:opt, size:20, font:'Arial', bold:isCorrect, color:isCorrect?GREEN:'222222'})]})]
              }),
            ]});
          });
          children.push(new Table({ width:{size:9360, type:WidthType.DXA}, columnWidths:[720,8640], rows }));
          children.push(new Paragraph({spacing:{after:60}}));
        }

        // ── Answer ──
        if (showAns) {
          const ansLine = (q.answerKey ? q.answerKey+' — ' : '') + (q.answerText||'');
          if (ansLine.trim()) {
            children.push(new Paragraph({
              children:[
                new TextRun({text:'Answer: ', bold:true, size:20, color:GREEN, font:'Arial'}),
                new TextRun({text:ansLine, size:20, font:'Arial', color:GREEN}),
              ],
              spacing:{before:60, after:60}, indent:{left:240}
            }));
          }
        }

        // ── Explanation ──
        if (showExp && q.explanation) {
          children.push(new Paragraph({
            children:[
              new TextRun({text:'Explanation: ', bold:true, size:18, color:DARKGRAY, font:'Arial', italics:true}),
              new TextRun({text:q.explanation, size:18, font:'Arial', color:DARKGRAY, italics:true}),
            ],
            spacing:{before:40, after:60}, indent:{left:240}
          }));
        }

        // ── Tag & Note ──
        if (showTags && tag) {
          children.push(new Paragraph({
            children:[new TextRun({text:`Tag: ${tag}`, size:17, color:'888888', font:'Arial'})],
            indent:{left:240}, spacing:{after:30}
          }));
        }
        if (note) {
          children.push(new Paragraph({
            children:[new TextRun({text:`Note: ${note}`, size:17, color:'AA8800', font:'Arial', italics:true})],
            indent:{left:240}, spacing:{after:30}
          }));
        }

        // ── Status badges ──
        const badges = [];
        if (isDoneQ) badges.push('Done');
        if (isWeakQ) badges.push('Weak');
        if (isFavQ)  badges.push('Fav');
        if (badges.length) {
          children.push(new Paragraph({
            children:[new TextRun({text:badges.join('  '), size:16, color:'AAAAAA', font:'Arial'})],
            indent:{left:240}, spacing:{after:100}
          }));
        }

        if (qi < visibleQuestions.length-1)
          children.push(new Paragraph({spacing:{before:60, after:60}}));
      });

      const doc = new Document({
        styles:{default:{document:{run:{font:'Arial', size:22}}}},
        sections:[{
          properties:{ page:{ size:{width:12240, height:15840}, margin:{top:1080, right:1080, bottom:1080, left:1080} } },
          children
        }]
      });

      const blob = await Packer.toBlob(doc);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url;
      a.download = `QnA_${(titleLabel||'export').replace(/[^a-z0-9]/gi,'_')}.docx`;
      a.click(); URL.revokeObjectURL(url);
      showToast('DOCX exported! 📄');
    } catch(err) {
      console.error('DOCX error',err);
      showToast('DOCX failed: '+err.message,'error');
    }
  };
  const exportToPDF = () => {
    if (!visibleQuestions.length) return showToast('Nothing to export','warn');
    const { jsPDF } = window.jspdf;
    if (!jsPDF) return showToast('PDF library not loaded','error');

    setIsExporting(true);
    showToast('Generating PDF...');

    try {
      const showOpts = displaySettings.showOptions;
      const showAns  = displaySettings.showAnswer;
      const showExp  = displaySettings.showExplanation;
      const showTags = displaySettings.showTags;

      const titleLabel = activeCollId
        ? collections.find(c=>c.id===activeCollId)?.name
        : activeTab==='SR Due' ? 'SR Due' : (activeFile||'Export');

      const doc = new jsPDF({ unit:'pt', format:'letter', orientation:'portrait' });
      const PW = 612, PH = 792;
      const ML = 48, MR = 48, MT = 48, MB = 48;
      const CW = PW - ML - MR; // content width = 516pt

      // ── Helpers ──
      const BLUE=[46,95,173], BLACK=[17,17,17], GRAY=[120,120,120],
            DKGRAY=[80,80,80], GREEN=[0,110,68], RED=[180,40,40],
            DONE=[30,160,80], LINE=[220,220,220], BGOPT=[245,250,255],
            BGCORRECT=[213,240,232];

      let y = MT;

      const checkPage = (need=16) => {
        if (y + need > PH - MB) {
          doc.addPage();
          y = MT;
        }
      };

      // wrap text to array of lines within maxWidth
      const wrap = (text, maxW, fontSize) => {
        doc.setFontSize(fontSize);
        return doc.splitTextToSize(String(text||''), maxW);
      };

      const textBlock = (lines, x, fontSize, color, opts={}) => {
        doc.setFontSize(fontSize);
        doc.setTextColor(...color);
        if (opts.bold) doc.setFont('helvetica','bold');
        else if (opts.italic) doc.setFont('helvetica','italic');
        else doc.setFont('helvetica','normal');
        const lh = fontSize * 1.4;
        lines.forEach(line => {
          checkPage(lh);
          doc.text(line, x, y);
          y += lh;
        });
        if (opts.after) y += opts.after;
      };

      // ── Title page header ──
      doc.setFillColor(...BLUE);
      doc.rect(ML, y, CW, 2, 'F');
      y += 8;
      textBlock([`QnA Hub — ${titleLabel}`], ML, 18, BLUE, {bold:true, after:4});
      const meta = [`${visibleQuestions.length} questions  ·  ${new Date().toLocaleDateString()}`,
        [showOpts?'':'options hidden', showAns?'':'answers hidden', showExp?'':'explanations hidden'].filter(Boolean).join('  ·  ')
      ].filter(Boolean).join('    ');
      textBlock([meta], ML, 9, GRAY, {after:16});
      doc.setFillColor(...LINE);
      doc.rect(ML, y, CW, 0.5, 'F');
      y += 12;

      // ── Questions ──
      visibleQuestions.forEach((q, qi) => {
        checkPage(40);

        const isDoneQ = completedIds.has(q.id);
        const isWeakQ = weakIds.has(q.id);
        const tag     = customTags[q.id]||q.tag;
        const note    = notes[q.id];

        // Question number badge
        const qLabel = `Q${qNum(q.id)}`;
        doc.setFillColor(...BLUE);
        doc.setTextColor(255,255,255);
        doc.setFont('helvetica','bold');
        doc.setFontSize(9);
        const badgeW = doc.getTextWidth(qLabel) + 8;
        doc.roundedRect(ML, y-9, badgeW, 13, 2, 2, 'F');
        doc.text(qLabel, ML+4, y);
        const qX = ML + badgeW + 6;

        // Question text
        const qColor = isDoneQ ? DONE : isWeakQ ? RED : BLACK;
        const qLines = wrap(q.question, CW - badgeW - 8, 11);
        doc.setFont('helvetica','bold');
        doc.setFontSize(11);
        doc.setTextColor(...qColor);
        qLines.forEach((line, li) => {
          if (li > 0) { checkPage(16); doc.text(line, qX, y); y += 15.4; }
          else { doc.text(line, qX, y); y += 15.4; }
        });
        y += 2;

        // Lesson
        if (q.lesson && q.lesson !== 'General') {
          checkPage(13);
          doc.setFont('helvetica','italic');
          doc.setFontSize(8);
          doc.setTextColor(...GRAY);
          doc.text(q.lesson, ML+4, y);
          y += 12;
        }

        // Options
        if (showOpts && q.options && q.options.length > 0) {
          y += 2;
          q.options.forEach((opt, oi) => {
            const letter = String.fromCharCode(65+oi);
            const isCorrect = showAns && q.answerKey && q.answerKey.toUpperCase()===letter;
            const optLines = wrap(opt, CW - 30, 10);
            const rowH = Math.max(18, optLines.length * 14 + 6);
            checkPage(rowH);

            // Row background
            doc.setFillColor(...(isCorrect ? BGCORRECT : BGOPT));
            doc.rect(ML, y - 11, CW, rowH, 'F');

            // Letter circle
            doc.setFillColor(...(isCorrect ? GREEN : [90,110,160]));
            doc.circle(ML+9, y-4, 7, 'F');
            doc.setTextColor(255,255,255);
            doc.setFont('helvetica','bold');
            doc.setFontSize(8);
            doc.text(letter, ML+6.5, y-1);

            // Option text
            doc.setFont('helvetica', isCorrect ? 'bold' : 'normal');
            doc.setFontSize(10);
            doc.setTextColor(...(isCorrect ? GREEN : DKGRAY));
            optLines.forEach((line, li) => {
              if (li > 0) { checkPage(14); doc.text(line, ML+22, y); y += 14; }
              else { doc.text(line, ML+22, y); }
            });
            y += rowH - (optLines.length-1)*14 - 2;
          });
          y += 4;
        }

        // Answer
        if (showAns) {
          const ansLine = (q.answerKey ? q.answerKey+' — ' : '') + (q.answerText||'');
          if (ansLine.trim()) {
            checkPage(16);
            doc.setFont('helvetica','bold');
            doc.setFontSize(9.5);
            doc.setTextColor(...GREEN);
            doc.text('Answer: ', ML+8, y);
            const labelW = doc.getTextWidth('Answer: ');
            doc.setFont('helvetica','normal');
            const aLines = wrap(ansLine, CW-8-labelW, 9.5);
            aLines.forEach((line, li) => {
              if (li===0) { doc.text(line, ML+8+labelW, y); y += 14; }
              else { checkPage(14); doc.text(line, ML+8+labelW, y); y += 14; }
            });
            y += 2;
          }
        }

        // Explanation
        if (showExp && q.explanation) {
          checkPage(14);
          const expLines = wrap('Explanation: '+q.explanation, CW-8, 9);
          doc.setFont('helvetica','italic');
          doc.setFontSize(9);
          doc.setTextColor(...DKGRAY);
          expLines.forEach(line => { checkPage(13); doc.text(line, ML+8, y); y += 13; });
          y += 2;
        }

        // Tag & Note
        if (showTags && tag) {
          checkPage(12);
          doc.setFont('helvetica','normal');
          doc.setFontSize(8);
          doc.setTextColor(...GRAY);
          doc.text(`Tag: ${tag}`, ML+8, y);
          y += 12;
        }
        if (note) {
          checkPage(12);
          const nLines = wrap('Note: '+note, CW-8, 8);
          doc.setFont('helvetica','italic');
          doc.setFontSize(8);
          doc.setTextColor(170,136,0);
          nLines.forEach(line => { checkPage(12); doc.text(line, ML+8, y); y += 12; });
        }

        // Divider
        y += 6;
        if (qi < visibleQuestions.length-1) {
          checkPage(10);
          doc.setFillColor(...LINE);
          doc.rect(ML, y, CW, 0.5, 'F');
          y += 10;
        }
      });

      // Page numbers
      const pageCount = doc.internal.getNumberOfPages();
      for (let i=1; i<=pageCount; i++) {
        doc.setPage(i);
        doc.setFont('helvetica','normal');
        doc.setFontSize(8);
        doc.setTextColor(...GRAY);
        doc.text(`${i} / ${pageCount}`, PW/2, PH-18, {align:'center'});
        doc.text('QnA Hub', ML, PH-18);
      }

      doc.save(`QnA_${(titleLabel||'export').replace(/[^a-z0-9]/gi,'_')}.pdf`);
      showToast('PDF exported! ✓');
    } catch(err) {
      console.error('PDF error', err);
      showToast('PDF failed: '+err.message,'error');
    } finally {
      setIsExporting(false);
    }
  };

  // ── Tabs ──
  const TABS = [
    {id:'All',label:'All',count:questions.length,cls:''},
    {id:'SR Due',label:'SR Due',count:srDueCount,cls:'act-p'},
  ];

  // practicePool = ALL questions with options (global, not view-filtered)
  // so Done/Weak are truly global regardless of which collection/tab is active
  const practicePool = useMemo(()=>questions.filter(q=>q.options&&q.options.length>0),[questions]);
  const wrongPool = useMemo(()=>questions.filter(q=>wrongCounts[q.id]>0&&q.options&&q.options.length>0),[questions,wrongCounts]);

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>

      {/* ══ HEADER ══ */}
      <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:50,padding:'0 20px',height:58,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
          <div style={{width:30,height:30,background:'var(--primary)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:900,fontSize:15}}>Q</div>
          <span style={{fontWeight:800,fontSize:15,letterSpacing:'-.02em'}}>QnA Hub</span>
          {streak>0&&<span title={`${streak} day streak!`} style={{fontSize:12,display:'flex',alignItems:'center',gap:3,color:'var(--yellow)'}}><I.Flame/>×{streak}</span>}
        </div>

        {/* Middle */}
        <div style={{display:'flex',alignItems:'center',gap:8,flex:1,margin:'0 12px',maxWidth:480}}>
          {AVAILABLE_FILES.length>1&&(
            <select className="input" style={{maxWidth:200}} value={activeFile} onChange={e=>{setActiveFile(e.target.value);loadFile(e.target.value);}}>
              {AVAILABLE_FILES.map(f=><option key={f} value={f}>{f}</option>)}
            </select>
          )}
          <button className="btn" onClick={()=>fileInputRef.current?.click()}><I.Upload/><span>Upload</span></button>
          <input ref={fileInputRef} type="file" accept=".json,.txt" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleFileUpload(e.target.files[0]);}}/>
        </div>

        {/* Right */}
        <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
          {questions.length>0&&<>
            <button className="btn ghost" onClick={()=>setShowAnalytics(true)} title="Analytics & Progress"><I.Chart/></button>
            <button className="btn ghost" onClick={()=>setShowStudyPlan(true)} title="Smart Study Plan">📋</button>
            <button className="btn ghost" onClick={()=>setShowCollections(true)} title="Collections"><I.Folder/></button>
            <button className="btn ghost" onClick={()=>setShowReport(true)} title="Report (Ctrl+R)">📊</button>
            <button className="btn ghost" onClick={()=>setShowKnowledgeMap(true)} title="Knowledge Map — visual progress by lesson & tag">🗺️</button>
            <button className="btn ghost" onClick={()=>setShowGoalModal(true)} title="Set Daily Goal">🎯</button>
            <button className="btn ghost" onClick={()=>setShowPomodoroTimer(true)} title="Pomodoro Timer">🍅</button>
            <button className="btn ghost" onClick={()=>setShowInsights(true)} title="Study Insights">💡</button>
            <button className="btn ghost" onClick={()=>setShowTopicMastery(true)} title="Topic Mastery">🏆</button>
            <button className="btn ghost" onClick={()=>setShowSessionHistory(true)} title="Study Sessions">📚</button>
            <button className="btn ghost" onClick={()=>setShowBookmarks(true)} title="Bookmarked Questions">⭐</button>
            <button className="btn ghost" onClick={()=>setShowBenchmark(true)} title="Performance Benchmark">📊</button>
            <button className="btn ghost" onClick={()=>setShowLearningPath(true)} title="Learning Path">🛤️</button>
            <button className="btn ghost" onClick={()=>setShowStudyReminders(true)} title="Study Reminders">🔔</button>
            {practicePool.length>0&&(
              <div style={{position:'relative',display:'flex',gap:4}}>
                <button className="btn primary" onClick={()=>{setPracticeMode('practice');setShowPractice(true);}} style={{padding:'6px 10px'}}><I.Brain/> Practice</button>
                <button className="btn primary" onClick={()=>setShowExamLauncher(true)} style={{padding:'6px 10px',fontSize:11}}>📝 Exam</button>
                {wrongPool.length>0&&<button className="btn danger" onClick={()=>{setPracticeMode('wrong');setShowPractice(true);}} style={{padding:'6px 10px',fontSize:11}}>❌ Wrong</button>}
                <button className="btn" onClick={()=>setShowTVLauncher(true)} style={{padding:'6px 10px',fontSize:11}} title="TV Show Mode — auto-advancing slideshow">📺 TV</button>
                <button className="btn" onClick={()=>setShowNarration(true)} style={{padding:'6px 10px',fontSize:11}} title="Narration — listen to questions read aloud">🔊 Listen</button>
              </div>
            )}
          </>}
          <button className="btn ghost" onClick={()=>setShowShortcuts(true)} title="Keyboard shortcuts (Ctrl+K)"><I.Keyboard/></button>
          <ThemePicker theme={theme} setTheme={setTheme}/>
        </div>
      </div>

      {/* ══ QUICK STATS BAR ══ */}
      {questions.length > 0 && (
        <div style={{background:'var(--card2)',borderBottom:'1px solid var(--border)',padding:'8px 20px',display:'flex',gap:16,alignItems:'center',flexWrap:'wrap',fontSize:12,color:'var(--muted)'}}>
          <div style={{display:'flex',gap:4,alignItems:'center'}}><span>⏱️</span> <span>Session: {formatSessionTime(sessionDuration)}</span></div>
          <div style={{display:'flex',gap:4,alignItems:'center'}}><span>✓</span> <span>Done: {completedIds.size}/{questions.length}</span></div>
          {dailyGoal > 0 && (
            <div style={{display:'flex',gap:4,alignItems:'center',color:completedIds.size >= dailyGoal ? 'var(--green)' : 'var(--muted)'}}><span>🎯</span> <span>Goal: {Math.min(completedIds.size, dailyGoal)}/{dailyGoal}</span></div>
          )}
          {studyStreak > 0 && (
            <div style={{display:'flex',gap:4,alignItems:'center',color:'var(--yellow)'}}><span>🔥</span> <span>Streak: {studyStreak} days</span></div>
          )}
          <div style={{display:'flex',gap:4,alignItems:'center'}}><span>⚡</span> <span>Weak: {Object.values(wrongCounts).filter(w => w >= 3).length}</span></div>
          <div style={{marginLeft:'auto'}}>
            <button onClick={exportProgressCSV} style={{fontSize:11,padding:'4px 8px',borderRadius:'var(--rs)',background:'var(--pg)',border:'1px solid var(--primary)',color:'var(--primary)',cursor:'pointer',fontWeight:500}}>💾 Export CSV</button>
          </div>
        </div>
      )}


      {/* ══ TOOLBAR ══ */}
      {questions.length>0&&!isLoading&&(
        <div style={{background:'var(--surface)',padding:'8px 20px',borderBottom:'1px solid var(--border)',position:'sticky',top:58,zIndex:120}}>
          <div style={{maxWidth:1200,margin:'0 auto',display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>

            {/* Lesson filter */}
            <div ref={lessonDDRef} style={{position:'relative'}}>
              <button className="btn" onClick={()=>{setLessonDDOpen(v=>!v);setTagDDOpen(false);}}>
                <I.Filter/>{selectedLessons.size===0?'All Lessons':`${selectedLessons.size} lesson(s)`}<I.Cd/>
              </button>
              {lessonDDOpen&&(
                <LessonFilterPanel
                  availableLessons={availableLessons}
                  selectedLessons={selectedLessons}
                  onToggle={toggleLesson}
                  onClear={()=>{setSelectedLessons(new Set());setLessonDDOpen(false);}}
                />
              )}
            </div>

            {/* Tag filter */}
            {allTags.tags.length>0&&(
              <div ref={tagDDRef} style={{position:'relative'}}>
                <button className="btn" onClick={()=>{setTagDDOpen(v=>!v);setLessonDDOpen(false);}}>
                  <I.Tag/>{selectedTags.size===0?'All Tags':`${selectedTags.size} tag(s)`}<I.Cd/>
                </button>
                {tagDDOpen&&(
                  <TagFilterPanel
                    allTags={allTags.tags}
                    restTags={allTags.restTags}
                    selectedTags={selectedTags}
                    excludeTags={excludeTags}
                    onToggle={toggleTag}
                    onToggleExclude={(tag) => setExcludeTags(prev => {
                      const n = new Set(prev);
                      n.has(tag) ? n.delete(tag) : n.add(tag);
                      return n;
                    })}
                    onClear={()=>{setSelectedTags(new Set());setTagDDOpen(false);}}
                    questions={questions}
                    customTags={customTags}
                    showToast={showToast}
                  />
                )}
              </div>
            )}

            {/* Quick filter chips */}
            <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
              {[
                {key:'all',    label:'All',     color:'var(--muted)'},
                {key:'unsolved',label:'Unsolved',color:'var(--yellow)'},
                {key:'done',   label:'Done',    color:'var(--green)'},
                {key:'fav',    label:'★ Fav',   color:'var(--yellow)'},
                {key:'weak',   label:'⚡ Weak', color:'var(--red)'},
              ].map(f => {
                const on = qFilters.has(f.key) || (f.key==='all' && qFilters.has('all'));
                return (
                  <button key={f.key} onClick={()=>toggleQFilter(f.key)}
                    style={{padding:'4px 9px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',transition:'all .15s',whiteSpace:'nowrap',
                      border:`1px solid ${on ? f.color : 'var(--border2)'}`,
                      background: on ? f.color+'22' : 'var(--card2)',
                      color: on ? f.color : 'var(--muted)'}}>
                    {f.label}
                  </button>
                );
              })}
            </div>

            {/* Search */}
            <div style={{position:'relative',flex:1,minWidth:200}}>
              <div style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--muted)'}}><I.Search/></div>
              <input ref={searchRef} className="input" style={{paddingLeft:32}} placeholder="Search, ID, or range (1-50)... (Ctrl+F)" value={searchQuery} onChange={e=>handleSearch(e.target.value)}/>
              {searchQuery&&<button onClick={()=>{setSearchQuery('');setDSearch('');}} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--muted)'}}><I.X/></button>}
            </div>

            {/* Display */}
            <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {[{k:'showOptions',l:'Options'},{k:'showAnswer',l:'Answers'},{k:'showExplanation',l:'Explain'},{k:'showTags',l:'Tags'}].map(s=>(
                <button key={s.k} className="btn" onClick={()=>{
                  if(s.k==='showAnswer') setLocalAnsOverrides({});
                  if(s.k==='showOptions') setLocalOptOverrides({});
                  if(s.k==='showExplanation') setLocalExpOverrides({});
                  setDisplaySettings(p=>({...p,[s.k]:!p[s.k]}));
                }} style={{fontSize:11,padding:'5px 9px',...(displaySettings[s.k]?{background:'var(--primary)',color:'#fff',borderColor:'var(--primary)'}:{opacity:.6})}}>
                  {displaySettings[s.k]?<I.Eye/>:<I.EyeOff/>} {s.l}
                </button>
              ))}
              <button className="btn" onClick={()=>setCompact(v=>!v)} style={{fontSize:11,padding:'5px 9px',...(compact?{background:'var(--card2)'}:{opacity:.7})}}>
                {compact?'⊡ Normal':'⊟ Compact'}
              </button>
              <button className="btn" onClick={toggleCollapseAll} style={{fontSize:11,padding:'5px 9px'}}>
                {collapsedIds.size>0?'↕ Expand':'↕ Collapse'}
              </button>
              <button className="btn" onClick={()=>setAutoCollapseDone(v=>!v)}
                title="Auto-collapse card when marked Done"
                style={{fontSize:11,padding:'5px 9px',gap:5,...(autoCollapseDone?{background:'var(--green)',color:'#fff',borderColor:'var(--green)'}:{opacity:.65})}}>
                {autoCollapseDone?'↙ Auto-fold ✓':'↙ Auto-fold'}
              </button>
              <button className="btn" onClick={()=>{setBulkMode(v=>!v);setSelectedBulk(new Set());}}
                title="Bulk-select mode (checkbox select + batch actions)"
                style={{fontSize:11,padding:'5px 9px',...(bulkMode?{background:'var(--purple)',color:'#fff',borderColor:'var(--purple)'}:{opacity:.75})}}>
                {bulkMode?'☑ Bulk on':'☑ Bulk'}
              </button>
            </div>

            <div style={{flex:1}}/>
            <div style={{display:'flex',gap:6}}>
              <button className="btn" onClick={exportToText} style={{fontSize:11}}><I.Copy/> Copy</button>
              <button className="btn" onClick={exportToPDF} disabled={isExporting} style={{fontSize:11}}>{isExporting?<I.Loader/>:<I.Download/>} PDF</button>
              <button className="btn" onClick={exportToDocx} style={{fontSize:11}}>📄 DOCX</button>
              {/* Reset buttons */}
              <div style={{width:1,height:20,background:'var(--border2)',margin:'0 2px'}}/>
              <button className="btn" onClick={()=>{if(confirm(`Reset all progress for "${activeFile||'this file'}"?\nThis clears done, favorites, notes, wrong counts, and collections for this file only.`))resetFileData();}}
                style={{fontSize:11,color:'var(--yellow)',borderColor:'var(--yellow)',opacity:.8}}
                title="Reset progress for current file only">
                ↺ File
              </button>
              <button className="btn" onClick={()=>{if(confirm('Reset ALL data for ALL files?\nThis cannot be undone.'))resetAllData();}}
                style={{fontSize:11,color:'var(--red)',borderColor:'var(--red)',opacity:.8}}
                title="Reset everything — all files, all progress">
                🗑 All
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ══ COLLECTION SETS PANEL ══ */}
      {questions.length>0&&(
        <div className="set-panel">
          <div style={{maxWidth:1200,margin:'0 auto'}}>

            {/* ── System tabs row (All / SR Due / overall progress) ── */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid var(--border)',height:40,padding:'0 12px',gap:8}}>
              <div style={{display:'flex',gap:3}}>
                {TABS.map(tab=>(
                  <button key={tab.id} className={`tab-btn ${activeTab===tab.id?tab.cls||'active':''}`}
                    style={{padding:'4px 10px',fontSize:12}}
                    onClick={()=>{setActiveTab(tab.id);setActiveCollId(null);}}>
                    {tab.label}
                    <span style={{fontFamily:'var(--mono)',fontSize:9,opacity:.8,background:'rgba(255,255,255,.15)',padding:'1px 5px',borderRadius:4}}>{tab.count}</span>
                  </button>
                ))}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                <span style={{fontSize:11,color:'var(--muted)',fontFamily:'var(--mono)'}}>{pct}%</span>
                <div className="pb" style={{width:80}}><div className="pb-fill" style={{width:`${pct}%`,background:pct>=80?'var(--green)':'var(--primary)'}}/></div>
              </div>
            </div>

            {/* ── Collection Sets: one row per set, only one expanded ── */}
            {collectionSets.map(set=>{
              const isOpen = activeSetId===set.id;
              const typeIcon = set.type==='lesson'?'📚':set.type==='numeric'?'🔢':'📁';
              const isUser = set.type==='user';
              return (
                <div key={set.id} className="set-row">
                  {/* Set label / toggle */}
                  <div className="set-label" style={{color:isOpen?'var(--primary)':'var(--muted)'}}
                    onClick={()=>setActiveSetId(isOpen?'__none__':set.id)}>
                    <span style={{fontSize:13}}>{typeIcon}</span>
                    {/* Editable name for user sets */}
                    {isUser ? (
                      <input
                        defaultValue={set.name}
                        onBlur={e=>setCollectionSets(prev=>prev.map(s=>s.id!==set.id?s:{...s,name:e.target.value.trim()||s.name}))}
                        onKeyDown={e=>{e.key==='Enter'&&e.target.blur(); e.stopPropagation();}}
                        onClick={e=>e.stopPropagation()}
                        style={{background:'none',border:'none',outline:'none',fontWeight:700,fontSize:11,
                          color:'inherit',fontFamily:'var(--font)',textTransform:'uppercase',
                          letterSpacing:'.07em',width:'80px',cursor:'text'}}
                        title="Click to rename"/>
                    ):(
                      <span style={{fontWeight:700,fontSize:11,textTransform:'uppercase',letterSpacing:'.07em'}}>{set.name}</span>
                    )}
                    <span style={{fontSize:9,marginLeft:'auto'}}>{isOpen?'▲':'▼'}</span>
                  </div>

                  {/* Chip row — only when open */}
                  {isOpen&&(
                    <div className="set-chips">
                      {set.colls.length===0&&(
                        <span style={{fontSize:11,color:'var(--muted)',padding:'0 4px'}}>Empty — click ✎ to add collections</span>
                      )}
                      {set.colls.map(c=>{
                        const done=c.qIds.filter(id=>completedIds.has(id)).length;
                        const total=c.qIds.length;
                        const pctC=total>0?Math.round(done/total*100):0;
                        const isActive=activeTab==='Collection'&&activeCollId===c.id;
                        return (
                          <button key={c.id} className={`coll-chip${isActive?' active':''}`}
                            style={{borderColor:isActive?c.color:'var(--border2)',
                              background:isActive?c.color+'22':'var(--card2)',
                              color:isActive?c.color:'var(--muted)'}}
                            onClick={()=>{setActiveTab('Collection');setActiveCollId(c.id);}}>
                            <div style={{width:6,height:6,borderRadius:'50%',background:c.color,flexShrink:0}}/>
                            <span>{c.name}</span>
                            <span style={{fontFamily:'var(--mono)',fontSize:9,opacity:.7}}>{done}/{total}</span>
                            {total>0&&(
                              <div className="coll-chip-prog">
                                <div style={{height:'100%',background:c.color,width:`${pctC}%`,borderRadius:2,transition:'width .4s'}}/>
                              </div>
                            )}
                          </button>
                        );
                      })}
                    </div>
                  )}
                  {!isOpen&&<div style={{flex:1}}/>}

                  {/* Actions */}
                  <div className="set-actions">
                    {isUser&&<>
                      <button className="set-action-btn" onClick={()=>{setActiveSetId(set.id);setShowCollections(true);}}>✎ Edit</button>
                      {collectionSets.filter(s=>s.type==='user').length<6&&(
                        <button className="set-action-btn" title="Add new user set"
                          onClick={()=>{
                            const id='set-user-'+Date.now();
                            setCollectionSets(prev=>[...prev,{id,name:'New Set',type:'user',colls:[]}]);
                            setActiveSetId(id);
                          }}>+ Set</button>
                      )}
                      {collectionSets.filter(s=>s.type==='user').length>1&&(
                        <button className="set-action-btn" style={{color:'var(--red)'}}
                          title="Delete this set"
                          onClick={()=>{
                            setCollectionSets(prev=>prev.filter(s=>s.id!==set.id));
                            setActiveSetId(collectionSets.find(s=>s.type==='user'&&s.id!==set.id)?.id||'set-lessons');
                          }}>✕</button>
                      )}
                    </>}
                    {!isUser&&(
                      <button className="set-action-btn" title={`Regenerate "${set.name}" from current questions`}
                        onClick={()=>{
                          if(!questions.length) return;
                          const sys = buildSystemSets(questions, availableLessons);
                          const updated = sys.find(s=>s.id===set.id);
                          if(updated) setCollectionSets(prev=>prev.map(s=>s.id===set.id?updated:s));
                          showToast(`↺ ${set.name} refreshed`);
                        }}>↺ Reset</button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}


      {/* ══ MAIN ══ */}
      <main style={{flex:1,maxWidth:1200,width:'100%',margin:'0 auto',padding:'18px 20px',boxSizing:'border-box'}}>

        {/* Drop zone */}
        {!isLoading&&!fetchError&&questions.length===0&&(
          <div className={`upload-zone ${isDragOver?'drag':''} afu`}
            onDragOver={e=>{e.preventDefault();setIsDragOver(true);}} onDragLeave={()=>setIsDragOver(false)}
            onDrop={e=>{e.preventDefault();setIsDragOver(false);const f=e.dataTransfer.files[0];if(f)handleFileUpload(f);}}
            onClick={()=>fileInputRef.current?.click()}>
            <div style={{fontSize:40,marginBottom:12}}>📂</div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Drop your question file here</div>
            <div style={{color:'var(--muted)',fontSize:13}}>or click to browse — supports pre-parsed .json and .txt files</div>
          </div>
        )}

        {/* Loading */}
        {isLoading&&(
          <div style={{display:'flex',flexDirection:'column',gap:10,maxWidth:700,margin:'0 auto',paddingTop:20}}>
            {[...Array(6)].map((_,i)=><div key={i} className="shimmer" style={{height:compact?55:85,borderRadius:12}}/>)}
          </div>
        )}

        {/* Error */}
        {fetchError&&!isLoading&&(
          <div style={{textAlign:'center',padding:60}} className="afu">
            <div style={{fontSize:32,marginBottom:10}}>⚠️</div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:8,color:'var(--red)'}}>Failed to load</div>
            <div style={{color:'var(--muted)',fontSize:13,maxWidth:400,margin:'0 auto 16px'}}>{fetchError}</div>
            <button className="btn primary" onClick={()=>fileInputRef.current?.click()}>Upload Manually</button>
          </div>
        )}

        {/* Streak heatmap */}
        {!isLoading&&!fetchError&&questions.length>0&&sessions.length>0&&(
          <div style={{marginBottom:14,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
            <span style={{fontSize:11,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em'}}>Study activity (90d)</span>
            <StreakHeatmap sessions={sessions}/>
            {streak>0&&<span style={{fontSize:12,color:'var(--yellow)',fontWeight:700,display:'flex',alignItems:'center',gap:4}}><I.Flame/>{streak} day streak</span>}
          </div>
        )}

        {/* Questions */}
        {!isLoading&&!fetchError&&questions.length>0&&(
          <>
            <div style={{color:'var(--muted)',fontSize:11,marginBottom:12,fontFamily:'var(--mono)',display:'flex',alignItems:'center',gap:12}}>
              <span>
                Showing {visibleQuestions.length} of {questions.length}
                {!qFilters.has('all') && qFilters.size>0 && (
                  <span style={{color:'var(--primary)',marginLeft:6}}>
                    [{Array.from(qFilters).join('+')}]
                  </span>
                )}
              </span>
              {dSearch&&<span>for "<b style={{color:'var(--text)'}}>{dSearch}</b>"</span>}
              {focusedIdx>=0&&visibleQuestions[focusedIdx]&&<span style={{color:'var(--primary)'}}>focused: Q{qNum(visibleQuestions[focusedIdx].id)} (J/K to navigate)</span>}
            </div>

            {/* ✓ NEW: Selected tags display - show prominently */}
            {selectedTags.size > 0 && (
              <div style={{background:'var(--primary)',color:'#fff',padding:'12px 16px',borderRadius:'var(--r)',marginBottom:'16px',display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center',border:'2px solid var(--primary)'}}>
                <strong style={{fontSize:'12px',textTransform:'uppercase',letterSpacing:'0.5px',whiteSpace:'nowrap'}}>📌 Filtered by:</strong>
                {Array.from(selectedTags).map(tag => (
                  <span key={tag} style={{background:'rgba(255,255,255,0.2)',padding:'6px 12px',borderRadius:'var(--rs)',fontSize:'13px',fontWeight:'500',display:'inline-flex',alignItems:'center',gap:'6px'}}>
                    {tag}
                    <button onClick={() => {
                      setSelectedTags(prev => {
                        const newSet = new Set(prev);
                        newSet.delete(tag);
                        return newSet;
                      });
                    }} style={{background:'none',border:'none',color:'#fff',cursor:'pointer',fontSize:'16px',padding:'0',lineHeight:'1'}}>×</button>
                  </span>
                ))}
              </div>
            )}

            {visibleQuestions.length===0?(
              <div style={{textAlign:'center',padding:60,border:'2px dashed var(--border2)',borderRadius:16,color:'var(--muted)'}} className="afu">
                <div style={{fontSize:32,marginBottom:8}}>🔍</div>
                <div style={{fontWeight:600,marginBottom:4}}>No questions match</div>
                <div style={{fontSize:13}}>Adjust search or filters</div>
              </div>
            ):(
              <>
              {/* Bulk action bar (sticky, shown in bulk mode) */}
              {bulkMode && (
                <div className="bulk-bar">
                  <span style={{fontWeight:700,fontSize:13}}>
                    {selectedBulk.size} selected
                  </span>
                  <button onClick={()=>setSelectedBulk(new Set(visibleQuestions.map(q=>q.id)))}>All {visibleQuestions.length}</button>
                  <button onClick={()=>setSelectedBulk(new Set())} disabled={!selectedBulk.size}>Clear</button>
                  <div className="bulk-sep"/>
                  <button onClick={bulkMarkDone} disabled={!selectedBulk.size}>✓ Mark Done</button>
                  <button onClick={bulkMarkWeak} disabled={!selectedBulk.size}>⚡ Mark Weak</button>
                  {/* Add-to-collection picker */}
                  {collections.length>0 && (
                    <div style={{position:'relative'}}>
                      <button disabled={!selectedBulk.size}
                        onClick={e=>{e.currentTarget.nextSibling.style.display=e.currentTarget.nextSibling.style.display==='block'?'none':'block'}}>
                        📁 Add to… ▾
                      </button>
                      <div style={{display:'none',position:'absolute',top:'calc(100% + 6px)',left:0,background:'var(--card)',border:'1px solid var(--border2)',borderRadius:8,minWidth:160,boxShadow:'var(--shadow)',zIndex:100}}>
                        {collections.map(c=>(
                          <div key={c.id} onClick={()=>{bulkAddToCollection(c.id);}}
                            className="dd-item" style={{padding:'8px 12px',fontSize:13,display:'flex',alignItems:'center',gap:8,cursor:'pointer',borderBottom:'1px solid var(--border)'}}>
                            <div style={{width:8,height:8,borderRadius:'50%',background:c.color,flexShrink:0}}/>
                            {c.name}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {activeCollId && (
                    <button onClick={()=>bulkRemoveFromColl(activeCollId)} disabled={!selectedBulk.size}
                      style={{background:'rgba(240,96,88,.3)',borderColor:'rgba(240,96,88,.5)'}}>
                      🗑 Remove from collection
                    </button>
                  )}
                  <div style={{flex:1}}/>
                  <button onClick={()=>{setBulkMode(false);setSelectedBulk(new Set());}}>✕ Exit</button>
                </div>
              )}
              <div id="q-list">
                {visibleQuestions.map((q,i)=>{
                  const qCollections = qCollectionsMap[q.id] || [];
                  return (
                    <QuestionCard key={q.id} q={q}
                      isCollapsed={collapsedIds.has(q.id)} isFav={favIds.has(q.id)}
                      isDone={completedIds.has(q.id)} isPinned={pinnedIds.has(q.id)}
                      isWeak={weakIds.has(q.id)} srCard={srData[q.id]} isDue={isDue(srData[q.id])}
                      displaySettings={displaySettings} searchQ={dSearch}
                      onToggleCollapse={toggleCollapse} onToggleFav={toggleFav}
                      onToggleDone={toggleDone} onTogglePin={togglePin}
                      onOpenNote={qId=>setNoteModal({qId,question:q.question})}
                      noteText={notes[q.id]||''} onOpenTag={qId=>setTagModal({qId,question:q.question,tags:q.tags||[]})}
                      customTag={customTags[q.id]||''}
                      compact={compact} collections={qCollections}
                      focused={focusedIdx===i} onFocusClick={()=>setFocusedIdx(i)}
                      localAnsOverride={localAnsOverrides[q.id]}
                      onToggleLocalAns={toggleLocalAns}
                      localOptOverride={localOptOverrides[q.id]}
                      onToggleLocalOpt={toggleLocalOpt}
                      localExpOverride={localExpOverrides[q.id]}
                      onToggleLocalExp={toggleLocalExp}
                      bulkMode={bulkMode}
                      isBulkSelected={selectedBulk.has(q.id)}
                      onToggleBulk={toggleBulkSelect}
                      onJumpTag={jumpToTag}
                      setQDifficulty={setQDifficulty}
                      questionDifficulty={questionDifficulty}
                      showToast={showToast}
                      onCopyTags={setCopiedTags}
                    />
                  );
                })}
              </div>
              </>
            )}
          </>
        )}
      </main>

      {/* ══ MODALS ══ */}
      {showExamLauncher&&<ExamLauncher
        questions={questions}
        collections={collections}
        completedIds={completedIds}
        wrongCounts={wrongCounts}
        onClose={()=>setShowExamLauncher(false)}
        onStart={(pool)=>{
          setExamCustomPool(pool);
          setPracticeMode('exam');
          setShowPractice(true);
          setShowExamLauncher(false);
        }}
      />}
      {showReport&&<ReportModal questions={questions} favIds={favIds} completedIds={completedIds} notes={notes} srData={srData} weakIds={weakIds} sessions={sessions} streak={streak} onClose={()=>setShowReport(false)}/>}
      {showAnalytics&&<AnalyticsModal analytics={getAnalytics()} sessionTime={formatSessionTime(sessionDuration)} streak={studyStreak} onClose={()=>setShowAnalytics(false)}/>}
      {showGoalModal&&<DailyGoalModal currentGoal={dailyGoal} onSetGoal={(g)=>{setDailyGoal(g);save('dailyGoal',g);showToast(`✓ Daily goal set to ${g} questions`);}} onClose={()=>setShowGoalModal(false)}/>}
      {showStudyPlan&&<StudyPlanModal recommendations={getSmartRecommendations()} onStartStudy={(q)=>{setPracticeMode('practice');setExamCustomPool([q]);setShowPractice(true);}} onClose={()=>setShowStudyPlan(false)}/>}
      {showPomodoroTimer&&<PomodoroTimerModal timeLeft={pomodoroSecondsLeft} isActive={pomodoroActive} onToggle={()=>setPomodoroActive(!pomodoroActive)} onTimeChange={(mins)=>{setPomodoroTime(mins);setPomodoroSecondsLeft(mins*60);setPomodoroActive(false);}} onClose={()=>setShowPomodoroTimer(false)}/>}
      {showInsights&&<InsightsModal insights={getInsights()} performance={getAnalytics()} velocity={getStudyVelocity()} estimatedCompletion={estimatedCompletion} onClose={()=>setShowInsights(false)}/>}
      {showTopicMastery&&<TopicMasteryModal lessons={availableLessons} masteryData={Object.fromEntries(availableLessons.map(l=>[l,getLessonPerformance(l)]))} onClose={()=>setShowTopicMastery(false)}/>}
      {showSessionHistory&&<SessionHistoryModal logs={sessionLogs} onClose={()=>setShowSessionHistory(false)}/>}
      {showLearningPath&&<LearningPathModal path={learningPath} currentIndex={currentPathIndex} onSelectTopic={(idx)=>setCurrentPathIndex(idx)} onGenerate={generateLearningPath} onClose={()=>setShowLearningPath(false)}/>}
      {showBookmarks&&<BookmarksModal questions={questions} bookmarkedIds={bookmarkedQuestions} onRemoveBookmark={(qId)=>toggleBookmark(qId)} onClose={()=>setShowBookmarks(false)}/>}
      {showBenchmark&&<BenchmarkModal benchmark={performanceBenchmark} onClose={()=>setShowBenchmark(false)}/>}
      {showPractice&&(
        <PracticeMode
          questions={practiceMode==='wrong'?wrongPool:practiceMode==='exam'?(examCustomPool||practicePool.slice(0,40)):practicePool}
          mode={practiceMode} onClose={()=>{setShowPractice(false);setExamCustomPool(null);}} onRateSR={rateSR} weakIds={weakIds} onAddWrong={addWrong} onMarkDone={markDone} onMarkWeak={markWeak}
        />
      )}
      {showShortcuts&&<ShortcutsPanel onClose={()=>setShowShortcuts(false)}/>}
      {showNarration&&<NarrationMode
        questions={visibleQuestions} displaySettings={displaySettings}
        onClose={()=>setShowNarration(false)}/>}
      {showKnowledgeMap&&<KnowledgeMap
        questions={questions} completedIds={completedIds} favIds={favIds}
        weakIds={weakIds} customTags={customTags}
        onClose={()=>setShowKnowledgeMap(false)}/>}
      {showTVLauncher&&<TVLauncher
        questions={questions} collections={collections}
        availableLessons={availableLessons} allTags={allTags}
        completedIds={completedIds} favIds={favIds} weakIds={weakIds}
        tvHistory={tvHistory}
        onSaveHistory={(entry)=>setTvHistory(prev=>[entry,...prev.filter(h=>h.id!==entry.id)].slice(0,20))}
        onDeleteHistory={(id)=>setTvHistory(prev=>prev.filter(h=>h.id!==id))}
        onRenameHistory={(id,name)=>setTvHistory(prev=>prev.map(h=>h.id===id?{...h,name}:h))}
        onStart={(sess)=>{setTvSession(sess);setShowTVLauncher(false);}}
        onClose={()=>setShowTVLauncher(false)}
      />}
      {tvSession&&<TVPlayer
        session={tvSession}
        favIds={favIds} completedIds={completedIds}
        onToggleFav={toggleFav} onToggleDone={toggleDone}
        onClose={()=>setTvSession(null)}
      />}
      {showCollections&&(()=>{
        const userSets = collectionSets.filter(s=>s.type==='user');
        const editSet = userSets.find(s=>s.id===activeSetId) || userSets[0];
        if (!editSet) return null;
        const sysSets = collectionSets.filter(s=>s.type!=='user');
        return <CollectionsModal
          questions={questions} collections={editSet.colls} setName={editSet.name}
          systemSets={sysSets}
          exportCollectionAsShareable={exportCollectionAsShareable}
          setShareableCollectionText={setShareableCollectionText}
          setShowCollectionShare={setShowCollectionShare}
          onSave={(newColls,newName,silent)=>{
            setCollectionSets(prev=>prev.map(s=>s.id!==editSet.id?s:{...s,colls:newColls,name:newName||s.name}));
            if (!silent) { setShowCollections(false); showToast('Collections saved'); }
          }}
          onClose={()=>setShowCollections(false)} pinnedIds={pinnedIds} favIds={favIds}
          completedIds={completedIds} wrongIds={new Set(Object.keys(wrongCounts))}
          srData={srData} weakIds={weakIds}/>;
      })()}
      {noteModal&&<NoteModal qId={noteModal.qId} question={noteModal.question} noteText={notes[noteModal.qId]||''} onSave={saveNote} onClose={()=>setNoteModal(null)}/>}
      {tagModal&&<TagEditModal qId={tagModal.qId} question={tagModal.question} currentTag={[(customTags[tagModal.qId]||''), ...(tagModal.tags||[])].filter(t=>t).join(' | ')} onSave={saveCustomTag} onClose={()=>setTagModal(null)} allQuestions={questions} copiedTags={copiedTags} showToast={showToast}/>}
      
      {/* ✓ NEW: Collection Share Modal */}
      {showCollectionShare&&shareableCollectionText&&(
        <div className="modal-bg" onClick={()=>setShowCollectionShare(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:700, maxHeight:'90vh', overflow:'auto'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontWeight:800,fontSize:17}}>📤 Share Collection</div>
              <button className="btn ghost" onClick={()=>setShowCollectionShare(false)} style={{padding:'4px 8px'}}>✕</button>
            </div>

            <div style={{marginBottom:14, padding:'12px', background:'var(--gg)', borderRadius:'var(--r)', borderLeft:'4px solid var(--green)'}}>
              <div style={{fontSize:12, color:'var(--green)', fontWeight:600}}>✓ Collection ready to share!</div>
              <div style={{fontSize:11, color:'var(--green)', marginTop:4, opacity:0.8}}>Copy the prompt below and share it with anyone. They can import it directly.</div>
            </div>

            <div style={{marginBottom:16}}>
              <label style={{display:'block', fontSize:12, fontWeight:600, color:'var(--muted)', marginBottom:8, textTransform:'uppercase', letterSpacing:'0.5px'}}>
                📋 Share Prompt:
              </label>
              <textarea
                readOnly
                value={shareableCollectionText}
                style={{
                  width:'100%',
                  height:300,
                  padding:'12px',
                  background:'var(--card)',
                  border:'1px solid var(--border)',
                  borderRadius:'var(--r)',
                  color:'var(--text)',
                  fontFamily:'var(--mono)',
                  fontSize:12,
                  lineHeight:'1.5',
                  resize:'vertical'
                }}
              />
            </div>

            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn" onClick={()=>setShowCollectionShare(false)}>Close</button>
              <button className="btn primary" onClick={()=>{
                navigator.clipboard.writeText(shareableCollectionText);
                showToast('✓ Prompt copied to clipboard');
                setShowCollectionShare(false);
              }}>
                📋 Copy to Clipboard
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ══ TOAST ══ */}
      {toast&&(
        <div className="toast" style={{background:toast.type==='error'?'var(--red)':toast.type==='warn'?'var(--yellow)':'var(--green)',color:'#fff'}}>
          <span style={{flex:1}}>{toast.type==='error'?'⚠ ':toast.type==='warn'?'⚠ ':'✓ '}{toast.msg}</span>
          {toast.undoFn&&(
            <button className="toast-undo-btn" onClick={()=>{toast.undoFn();dismissToast();}}>↩ Undo</button>
          )}
          <button className="toast-x" onClick={dismissToast} title="Dismiss">×</button>
        </div>
      )}

      {/* Close dropdowns on outside click */}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
