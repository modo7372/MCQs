function CollectionRow({ c, idx, isActive, onSelect, onDelete, onRename, onRecolor, onMoveUp, onMoveDown, isFirst, isLast }) {
  const [editing, setEditing] = useState(false);
  const [draftName, setDraftName] = useState(c.name);
  const inputRef = useRef(null);

  const commitEdit = () => {
    const trimmed = draftName.trim();
    if (trimmed && trimmed !== c.name) onRename(trimmed);
    else setDraftName(c.name);
    setEditing(false);
  };

  useEffect(() => { if (editing) inputRef.current?.focus(); }, [editing]);

  return (
    <div
      style={{ display:'flex', alignItems:'center', gap:4, padding:'6px 8px', borderRadius:8, cursor:'pointer',
        background: isActive ? 'var(--card2)' : 'transparent',
        border: isActive ? '1px solid var(--border2)' : '1px solid transparent',
        transition:'background .12s' }}
      onClick={() => { if (!editing) onSelect(); }}
    >
      {/* Color swatch — click to recolor */}
      <input type="color" value={c.color}
        onChange={e => onRecolor(e.target.value)}
        onClick={e => e.stopPropagation()}
        title="Click to change color"
        style={{ width:14, height:14, border:'none', borderRadius:'50%', cursor:'pointer', padding:0,
          flexShrink:0, outline:'none', background:'transparent' }}/>

      {/* Name — double-click to edit */}
      {editing ? (
        <input ref={inputRef}
          value={draftName}
          onChange={e => setDraftName(e.target.value)}
          onBlur={commitEdit}
          onKeyDown={e => { if(e.key==='Enter') commitEdit(); if(e.key==='Escape'){setDraftName(c.name);setEditing(false);} }}
          onClick={e => e.stopPropagation()}
          style={{ flex:1, fontSize:12, background:'var(--card)', border:'1px solid var(--primary)',
            borderRadius:4, padding:'1px 5px', color:'var(--text)', fontFamily:'var(--font)', outline:'none' }}/>
      ) : (
        <span
          onDoubleClick={e => { e.stopPropagation(); setEditing(true); }}
          style={{ flex:1, fontSize:12, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}
          title={`Double-click to rename: ${c.name}`}>{c.name}</span>
      )}

      <span style={{ fontSize:10, color:'var(--muted)', fontFamily:'var(--mono)', flexShrink:0 }}>{c.qIds.length}</span>

      {/* Reorder buttons */}
      <div style={{ display:'flex', flexDirection:'column', gap:0, flexShrink:0 }}>
        <button onClick={e=>{e.stopPropagation();onMoveUp();}}
          disabled={isFirst}
          title="Move up"
          style={{ background:'none', border:'none', cursor:isFirst?'not-allowed':'pointer', color:'var(--muted)', padding:0, lineHeight:1, fontSize:9, opacity:isFirst?0.2:0.7 }}>▲</button>
        <button onClick={e=>{e.stopPropagation();onMoveDown();}}
          disabled={isLast}
          title="Move down"
          style={{ background:'none', border:'none', cursor:isLast?'not-allowed':'pointer', color:'var(--muted)', padding:0, lineHeight:1, fontSize:9, opacity:isLast?0.2:0.7 }}>▼</button>
      </div>

      {/* Delete */}
      <button onClick={e => { e.stopPropagation(); onDelete(); }}
        title="Delete collection"
        style={{ background:'none', border:'none', cursor:'pointer', color:'var(--muted)', padding:0, display:'flex', flexShrink:0 }}><I.X s={11}/></button>
    </div>
  );
}


// ═══════════════════════════════ QUERY ENTRY ROW ═══════════════════════════════
function QueryEntryRow({ entry, questions, onRerun, onDelete, onEdit, onLoadToInput }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(entry.text);
  const inputRef = useRef(null);

  useEffect(() => { if (editing) inputRef.current?.focus(); }, [editing]);

  const modeColors = { add:'var(--green)', replace:'var(--primary)', remove:'var(--red)' };
  const modeLabels = { add:'+add', replace:'↺replace', remove:'−remove' };
  const matched = resolveQuery(entry.text, questions);

  const commit = () => {
    const t = draft.trim();
    if (t && t !== entry.text) onEdit(t);
    else setDraft(entry.text);
    setEditing(false);
  };

  return (
    <div style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 8px',
      background:'var(--card)', border:'1px solid var(--border)', borderRadius:7,
      transition:'border-color .12s' }}
      onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border2)'}
      onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}
    >
      {/* Mode badge */}
      <span style={{ fontSize:9, fontWeight:700, padding:'2px 5px', borderRadius:4,
        color: modeColors[entry.mode], border:`1px solid ${modeColors[entry.mode]}`,
        flexShrink:0, fontFamily:'var(--mono)' }}>
        {modeLabels[entry.mode]}
      </span>

      {/* Editable query text */}
      {editing ? (
        <input ref={inputRef} value={draft}
          onChange={e=>setDraft(e.target.value)}
          onBlur={commit}
          onKeyDown={e=>{ if(e.key==='Enter') commit(); if(e.key==='Escape'){setDraft(entry.text);setEditing(false);} }}
          style={{ flex:1, background:'var(--card2)', border:'1px solid var(--primary)', borderRadius:4,
            outline:'none', fontFamily:'var(--mono)', fontSize:12, color:'var(--text)', padding:'2px 6px' }}/>
      ) : (
        <span
          onDoubleClick={()=>{setDraft(entry.text);setEditing(true);}}
          title="Double-click to edit"
          style={{ flex:1, fontFamily:'var(--mono)', fontSize:12, color:'var(--text)',
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', cursor:'text' }}>
          {entry.text}
        </span>
      )}

      {/* Match count */}
      <span style={{ fontSize:10, color:'var(--muted)', flexShrink:0, fontFamily:'var(--mono)' }}>
        {matched.size}q
      </span>

      {/* Action buttons */}
      <button onClick={onLoadToInput} title="Load into query input"
        style={{ background:'none', border:'none', cursor:'pointer', color:'var(--muted)', fontSize:11, padding:'0 2px', flexShrink:0 }}>
        ✎
      </button>
      <button onClick={onRerun} title="Re-run this query"
        style={{ background:'none', border:'none', cursor:'pointer', color:'var(--primary)', fontSize:11, padding:'0 2px', flexShrink:0 }}>
        ▶
      </button>
      <button onClick={onDelete} title="Delete this query"
        style={{ background:'none', border:'none', cursor:'pointer', color:'var(--red)', fontSize:11, padding:'0 2px', flexShrink:0 }}>
        ✕
      </button>
    </div>
  );
}

function CollectionsModal({ questions, collections, setName, systemSets, onSave, onClose, pinnedIds, favIds, completedIds, wrongIds, srData, weakIds, exportCollectionAsShareable, setShareableCollectionText, setShowCollectionShare }) {
  const [colls, setColls] = useState(() => {
    const c = JSON.parse(JSON.stringify(collections));
    return c.map(col => ({ ...col, queries: col.queries || [] }));
  });
  const [editedSetName, setEditedSetName] = useState(setName||'My Collections');
  const [newName, setNewName] = useState('');
  const [newColor, setNewColor] = useState('#5b8dee');
  const [active, setActive] = useState(null);
  // Per-collection query input state
  const [queryInputs, setQueryInputs] = useState({}); // {collId: string}
  const [queryPreviews, setQueryPreviews] = useState({}); // {collId: Set<id>}
  const [suggestions, setSuggestions] = useState({}); // {collId: [{tag/lesson, count}, ...]}
  const [showSuggestions, setShowSuggestions] = useState({}); // {collId: bool}

  // Auto-save whenever colls or set name changes
  const isFirstRender = useRef(true);
  useEffect(() => {
    if (isFirstRender.current) { isFirstRender.current = false; return; }
    onSave(colls, editedSetName, /*silent=*/true);
  }, [colls, editedSetName]);

  const activeCol = colls.find(c => c.id === active);

  const add = () => {
    if (!newName.trim()) return;
    const id = Date.now().toString();
    setColls(prev => [...prev, { id, name: newName.trim(), color: newColor, qIds: [], queries: [] }]);
    setNewName(''); setActive(id);
  };
  const del = (id) => { setColls(prev => prev.filter(c => c.id !== id)); if (active === id) setActive(null); };
  const toggleQ = (collId, qId) => {
    setColls(prev => prev.map(c => c.id !== collId ? c : {
      ...c, qIds: c.qIds.includes(qId) ? c.qIds.filter(x => x !== qId) : [...c.qIds, qId]
    }));
  };

  // Live query preview with suggestions
  const handleQueryInput = (collId, val) => {
    setQueryInputs(prev => ({ ...prev, [collId]: val }));
    const matched = resolveQuery(val, questions);
    setQueryPreviews(prev => ({ ...prev, [collId]: matched }));
    
    // Show suggestions if typing tag: or lesson: prefix
    const tagMatch = val.match(/tag:(\S*)$/i);
    const lessonMatch = val.match(/lesson:(\S*)$/i);
    
    if (tagMatch) {
      const searchTerm = tagMatch[1];
      const sug = getTagSuggestions(questions, searchTerm, true).slice(0, 12);
      setSuggestions(prev => ({ ...prev, [collId]: sug }));
      setShowSuggestions(prev => ({ ...prev, [collId]: true }));
    } else if (lessonMatch) {
      const searchTerm = lessonMatch[1];
      const sug = getLessonSuggestions(questions, searchTerm, true).slice(0, 12);
      setSuggestions(prev => ({ ...prev, [collId]: sug }));
      setShowSuggestions(prev => ({ ...prev, [collId]: true }));
    } else {
      setShowSuggestions(prev => ({ ...prev, [collId]: false }));
    }
  };

  // Insert a suggestion into the query input
  const insertSuggestion = (collId, suggestion) => {
    const current = queryInputs[collId] || '';
    const tagMatch = current.match(/tag:(\S*)$/i);
    const lessonMatch = current.match(/lesson:(\S*)$/i);
    let newVal = current;
    
    if (tagMatch) {
      newVal = current.slice(0, tagMatch.index) + `tag:${suggestion}`;
    } else if (lessonMatch) {
      newVal = current.slice(0, lessonMatch.index) + `lesson:${suggestion}`;
    }
    
    handleQueryInput(collId, newVal);
  };

  // Save a query entry to the collection's history
  const saveQueryEntry = (collId, text, mode) => {
    setColls(prev => prev.map(c => {
      if (c.id !== collId) return c;
      // dedupe: remove previous identical text entry, then push new one
      const filtered = (c.queries||[]).filter(q => q.text !== text);
      return { ...c, queries: [...filtered, { text, mode, ts: Date.now() }] };
    }));
  };

  const applyQuery = (collId) => {
    const text = queryInputs[collId] || '';
    const matched = queryPreviews[collId] || resolveQuery(text, questions);
    setColls(prev => prev.map(c => c.id !== collId ? c : {
      ...c, qIds: Array.from(new Set([...c.qIds, ...matched]))
    }));
    saveQueryEntry(collId, text.trim(), 'add');
    setQueryInputs(prev => ({ ...prev, [collId]: '' }));
    setQueryPreviews(prev => ({ ...prev, [collId]: new Set() }));
  };

  const replaceQuery = (collId) => {
    const text = queryInputs[collId] || '';
    const matched = queryPreviews[collId] || resolveQuery(text, questions);
    setColls(prev => prev.map(c => c.id !== collId ? c : { ...c, qIds: Array.from(matched) }));
    saveQueryEntry(collId, text.trim(), 'replace');
    setQueryInputs(prev => ({ ...prev, [collId]: '' }));
    setQueryPreviews(prev => ({ ...prev, [collId]: new Set() }));
  };

  const removeQuery = (collId) => {
    const text = queryInputs[collId] || '';
    const matched = queryPreviews[collId] || resolveQuery(text, questions);
    setColls(prev => prev.map(c => c.id !== collId ? c : {
      ...c, qIds: c.qIds.filter(id => !matched.has(id))
    }));
    saveQueryEntry(collId, text.trim(), 'remove');
    setQueryInputs(prev => ({ ...prev, [collId]: '' }));
    setQueryPreviews(prev => ({ ...prev, [collId]: new Set() }));
  };

  // Re-run a saved query entry
  const rerunEntry = (collId, entry) => {
    const matched = resolveQuery(entry.text, questions);
    setColls(prev => prev.map(c => {
      if (c.id !== collId) return c;
      if (entry.mode === 'replace') return { ...c, qIds: Array.from(matched) };
      if (entry.mode === 'remove')  return { ...c, qIds: c.qIds.filter(id => !matched.has(id)) };
      return { ...c, qIds: Array.from(new Set([...c.qIds, ...matched])) };
    }));
  };

  // Delete a saved query entry
  const deleteEntry = (collId, ts) => {
    setColls(prev => prev.map(c => c.id !== collId ? c : {
      ...c, queries: (c.queries||[]).filter(q => q.ts !== ts)
    }));
  };

  // Edit a saved query entry text
  const editEntry = (collId, ts, newText) => {
    setColls(prev => prev.map(c => c.id !== collId ? c : {
      ...c, queries: (c.queries||[]).map(q => q.ts === ts ? { ...q, text: newText } : q)
    }));
  };

  const PRESETS = [
    { name:'Wrong Answers',   color:'#f06058', icon:'⚡', desc:'Questions answered wrong ≥3×',
      query:'', fn:()=>Array.from(wrongIds) },
    { name:'Favourites',      color:'#f5a623', icon:'★', desc:'Starred questions',
      query:'', fn:()=>Array.from(favIds) },
    { name:'Completed',       color:'#3ecf8e', icon:'✓', desc:'Marked done',
      query:'', fn:()=>Array.from(completedIds) },
    { name:'Unsolved',        color:'#5b8dee', icon:'○', desc:'Not yet done',
      query:'', fn:()=>questions.filter(q=>!completedIds.has(q.id)).map(q=>q.id) },
    { name:'Has Explanation', color:'#a78bfa', icon:'📖', desc:'Questions with explanation text',
      query:'exp:.', fn:()=>questions.filter(q=>q.explanation&&q.explanation.trim()).map(q=>q.id) },
    { name:'MCQ Only',        color:'#38bdf8', icon:'☑', desc:'Questions with options (MCQ)',
      query:'', fn:()=>questions.filter(q=>q.options&&q.options.length>0).map(q=>q.id) },
    { name:'First Half',      color:'#fb923c', icon:'①', desc:`Questions 1–${Math.floor(questions.length/2)}`,
      query:`1-${Math.floor(questions.length/2)}`, fn:()=>questions.slice(0,Math.floor(questions.length/2)).map(q=>q.id) },
    { name:'Second Half',     color:'#e879f9', icon:'②', desc:`Questions ${Math.floor(questions.length/2)+1}–${questions.length}`,
      query:`${Math.floor(questions.length/2)+1}-${questions.length}`, fn:()=>questions.slice(Math.floor(questions.length/2)).map(q=>q.id) },
  ];

  const [activeTab2, setActiveTab2] = useState('mine'); // 'mine' | 'system'
  const qInput = (active && queryInputs[active]) || '';
  const qPreview = (active && queryPreviews[active]) || new Set();
  const previewCount = qPreview.size;

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 760, width:'95vw' }}>

        {/* Header */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
          <div style={{ fontWeight:800, fontSize:17, display:'flex', gap:8, alignItems:'center' }}>
            <I.Folder/>
            <input value={editedSetName} onChange={e=>setEditedSetName(e.target.value)}
              style={{background:'transparent',border:'none',outline:'none',fontWeight:800,fontSize:17,
                color:'var(--text)',fontFamily:'var(--font)',borderBottom:'1px dashed var(--border2)',
                paddingBottom:1,minWidth:60,maxWidth:180}}
              title="Set name — click to rename"/>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            {activeCol && (
              <button className="btn" onClick={() => {
                const prompt = exportCollectionAsShareable(activeCol);
                setShareableCollectionText(prompt);
                setShowCollectionShare(true);
              }} style={{background:'var(--purple)',borderColor:'var(--purple)',color:'#fff'}} title="Share this collection as a prompt">
                📤 Share
              </button>
            )}
            <button className="btn primary" onClick={() => onSave(colls, editedSetName)}>Save All</button>
            <button className="btn ghost" onClick={onClose}><I.X s={15}/></button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display:'flex', gap:2, marginBottom:14, borderBottom:'1px solid var(--border)', paddingBottom:0 }}>
          {[
            { id:'mine',    label:`My Collections (${colls.length})` },
            { id:'system',  label:`System (${(systemSets||[]).reduce((s,ss)=>s+ss.colls.length,0)})` },
            { id:'presets', label:'Presets & Defaults' },
          ].map(t => (
            <button key={t.id} onClick={()=>{ setActiveTab2(t.id); if(t.id!=='mine') setActive(null); }}
              style={{ padding:'6px 14px', fontSize:12, fontWeight:700, border:'none', cursor:'pointer',
                borderBottom: activeTab2===t.id ? '2px solid var(--primary)' : '2px solid transparent',
                background:'none', color: activeTab2===t.id ? 'var(--primary)' : 'var(--muted)',
                transition:'color .15s', marginBottom:-1 }}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ── TAB: MY COLLECTIONS ── */}
        {activeTab2 === 'mine' && (<>
          {/* New collection row */}
          <div style={{ display:'flex', gap:8, marginBottom:12 }}>
            <input className="input" placeholder="New collection name…" value={newName}
              onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key==='Enter' && add()} style={{ flex:1 }}/>
            <input type="color" value={newColor} onChange={e => setNewColor(e.target.value)}
              style={{ width:36, height:36, border:'none', borderRadius:6, cursor:'pointer', padding:2 }}/>
            <button className="btn primary" onClick={add}>+ New</button>
          </div>

          {/* Body: list + editor */}
          <div style={{ display:'flex', gap:12, minHeight:400 }}>
            {/* Left: collection list */}
            <div style={{ width:200, borderRight:'1px solid var(--border)', paddingRight:10, flexShrink:0, display:'flex', flexDirection:'column', gap:2, overflowY:'auto' }}>
              {colls.length === 0 && (
                <div style={{ fontSize:12, color:'var(--muted)', textAlign:'center', padding:'30px 0' }}>No collections yet.<br/>Create one above or<br/>clone from Presets tab.</div>
              )}
              {colls.map((c, idx) => (
                <CollectionRow
                  key={c.id} c={c} idx={idx}
                  isActive={active===c.id}
                  onSelect={()=>setActive(c.id)}
                  onDelete={()=>del(c.id)}
                  onRename={(name)=>setColls(prev=>prev.map(x=>x.id!==c.id?x:{...x,name}))}
                  onRecolor={(color)=>setColls(prev=>prev.map(x=>x.id!==c.id?x:{...x,color}))}
                  onMoveUp={()=>setColls(prev=>{const a=[...prev];if(idx===0)return a;[a[idx-1],a[idx]]=[a[idx],a[idx-1]];return a;})}
                  onMoveDown={()=>setColls(prev=>{const a=[...prev];if(idx===a.length-1)return a;[a[idx],a[idx+1]]=[a[idx+1],a[idx]];return a;})}
                  isFirst={idx===0} isLast={idx===colls.length-1}
                />
              ))}
            </div>

            {/* Right: editor panel */}
            <div style={{ flex:1, display:'flex', flexDirection:'column', gap:10, overflow:'hidden' }}>
              {!active && (
                <div style={{ fontSize:13, color:'var(--muted)', textAlign:'center', paddingTop:60 }}>
                  ← Select or create a collection to edit it
                </div>
              )}
              {active && activeCol && (<>
                {/* Saved Queries */}
                {(activeCol.queries||[]).length > 0 && (
                  <div style={{ background:'var(--card2)', border:'1px solid var(--border2)', borderRadius:10, padding:10 }}>
                    <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'.1em', color:'var(--muted)', marginBottom:7 }}>
                      Saved Queries ({activeCol.queries.length})
                    </div>
                    <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
                      {(activeCol.queries||[]).map(entry => (
                        <QueryEntryRow key={entry.ts} entry={entry} questions={questions}
                          onRerun={()=>rerunEntry(active, entry)}
                          onDelete={()=>deleteEntry(active, entry.ts)}
                          onEdit={(newText)=>editEntry(active, entry.ts, newText)}
                          onLoadToInput={()=>handleQueryInput(active, entry.text)}
                        />
                      ))}
                    </div>
                  </div>
                )}

                {/* Smart Query Input */}
                <div style={{ background:'var(--card2)', border:'1px solid var(--border2)', borderRadius:10, padding:12 }}>
                  <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'.1em', color:'var(--muted)', marginBottom:6 }}>
                    Smart Query
                  </div>
                  <input className="input"
                    placeholder='e.g. 1-80  |  5,12,44  |  fever IN 1-50  |  tag:malaria  |  lesson:cardio'
                    value={qInput}
                    onChange={e => handleQueryInput(active, e.target.value)}
                    onKeyDown={e => e.key==='Enter' && qInput.trim() && applyQuery(active)}
                    style={{ marginBottom:8 }}
                  />
                  
                  {/* Tag/Lesson suggestions dropdown */}
                  {showSuggestions[active] && suggestions[active] && suggestions[active].length > 0 && (
                    <div style={{ background:'var(--card)', border:'1px solid var(--border2)', borderRadius:6, padding:8, marginBottom:8 }}>
                      <div style={{ fontSize:10, fontWeight:700, color:'var(--muted)', marginBottom:6, textTransform:'uppercase', letterSpacing:'.08em' }}>
                        💡 Suggestions ({suggestions[active].length})
                      </div>
                      <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
                        {suggestions[active].map(([item, count]) => (
                          <button
                            key={item}
                            onClick={() => insertSuggestion(active, item)}
                            style={{
                              fontSize:11,
                              padding:'4px 10px',
                              background:'var(--border2)',
                              color:'var(--muted)',
                              border:'1px solid var(--border)',
                              borderRadius:4,
                              cursor:'pointer',
                              display:'flex',
                              alignItems:'center',
                              gap:4,
                              transition:'all 0.2s',
                              whiteSpace:'nowrap'
                            }}
                            onMouseOver={e => {e.target.style.background = 'var(--primary)'; e.target.style.color = 'white';}}
                            onMouseOut={e => {e.target.style.background = 'var(--border2)'; e.target.style.color = 'var(--muted)';}}
                          >
                            {item}
                            <span style={{ fontSize:9, opacity:0.7 }}>({count})</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  )}
                  
                  <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:8 }}>
                    {[['1-50','ID range'],['fever IN 1-50','keyword in range'],['q:fever','question field'],
                      ['tag:malaria','tag'],['lesson:inf','lesson'],['ans:B','answer key'],
                      ['A & B','AND'],['A ; B','OR']].map(([ex,tip]) => (
                      <button key={ex} onClick={() => handleQueryInput(active, ex)}
                        style={{ padding:'2px 8px', borderRadius:5, fontSize:10, fontFamily:'var(--mono)', fontWeight:600,
                          background:'var(--card)', border:'1px solid var(--border2)', color:'var(--muted)', cursor:'pointer', whiteSpace:'nowrap' }}
                        title={tip}>{ex}</button>
                    ))}
                  </div>
                  <div style={{ fontSize:10, color:'var(--muted)', lineHeight:1.7, marginBottom:6, borderTop:'1px solid var(--border)', paddingTop:6 }}>
                    <span style={{ fontWeight:700, color:'var(--primary)' }}>Syntax: </span>
                    <code style={{fontFamily:'var(--mono)',color:'var(--text)'}}>fever IN 1-50</code> · <code style={{fontFamily:'var(--mono)',color:'var(--text)'}}>A &amp; B</code> AND · <code style={{fontFamily:'var(--mono)',color:'var(--text)'}}>A ; B</code> OR · <code style={{fontFamily:'var(--mono)',color:'var(--text)'}}>q: ans: tag: lesson:</code> fields
                  </div>
                  {qInput.trim() && (
                    <div style={{ fontSize:12, color: previewCount>0?'var(--green)':'var(--red)', marginBottom:8, fontWeight:600 }}>
                      {previewCount>0 ? `✓ Matches ${previewCount} question${previewCount!==1?'s':''}` : '✗ No matches'}
                    </div>
                  )}
                  {previewCount > 0 && (
                    <div style={{ maxHeight:70, overflowY:'auto', marginBottom:8, display:'flex', flexDirection:'column', gap:3 }}>
                      {Array.from(qPreview).slice(0,8).map(qid => {
                        const qq = questions.find(x => x.id === qid);
                        return qq ? (
                          <div key={qid} style={{ fontSize:11, color:'var(--muted)', display:'flex', gap:6 }}>
                            <span style={{ fontFamily:'var(--mono)', color:'var(--primary)', flexShrink:0 }}>#{qNum(qid)}</span>
                            <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{qq.question.slice(0,65)}{qq.question.length>65?'…':''}</span>
                          </div>
                        ) : null;
                      })}
                      {previewCount > 8 && <div style={{ fontSize:11, color:'var(--muted)' }}>…and {previewCount-8} more</div>}
                    </div>
                  )}
                  <div style={{ display:'flex', gap:6 }}>
                    <button className="btn primary" style={{ fontSize:12, flex:1 }}
                      onClick={() => applyQuery(active)} disabled={!qInput.trim() || previewCount===0}>
                      + Add
                    </button>
                    <button className="btn" style={{ fontSize:12, flex:1 }}
                      onClick={() => replaceQuery(active)} disabled={!qInput.trim() || previewCount===0}>
                      ↺ Replace
                    </button>
                    <button className="btn" style={{ fontSize:12, flex:1, color:'var(--red)', borderColor:'var(--red)' }}
                      onClick={() => removeQuery(active)} disabled={!qInput.trim() || previewCount===0}>
                      − Remove
                    </button>
                  </div>
                </div>

                {/* Manual checkbox list */}
                <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'.1em', color:'var(--muted)' }}>
                  Or pick manually ({activeCol.qIds.length} selected)
                  {activeCol.qIds.length > 0 && (
                    <button onClick={() => setColls(prev => prev.map(c => c.id!==active?c:{...c,qIds:[]}))}
                      style={{ marginLeft:10, fontSize:10, color:'var(--red)', background:'none', border:'none', cursor:'pointer', fontWeight:700 }}>
                      Clear all
                    </button>
                  )}
                </div>
                <div style={{ flex:1, overflowY:'auto', maxHeight:180 }}>
                  {questions.map(q => {
                    const checked = activeCol.qIds.includes(q.id);
                    const isPreview = qPreview.has(q.id);
                    return (
                      <label key={q.id}
                        style={{ display:'flex', alignItems:'flex-start', gap:8, padding:'5px 8px', cursor:'pointer',
                          borderRadius:6, background: isPreview ? `${activeCol.color}18` : 'transparent',
                          border: isPreview ? `1px solid ${activeCol.color}44` : '1px solid transparent' }}
                        className="dd-item">
                        <input type="checkbox" checked={checked} onChange={() => toggleQ(active, q.id)}
                          style={{ marginTop:2, accentColor:activeCol.color }}/>
                        <span style={{ fontSize:12, lineHeight:1.5, flex:1 }}>
                          <span style={{ fontFamily:'var(--mono)', color:'var(--muted)', fontSize:10 }}>#{qNum(q.id)}</span>
                          {' '}{q.question.slice(0,75)}{q.question.length>75?'…':''}
                        </span>
                      </label>
                    );
                  })}
                </div>
              </>)}
            </div>
          </div>
        </>)}

        {/* ── TAB: SYSTEM COLLECTIONS ── */}
        {activeTab2 === 'system' && (
          <div style={{ minHeight:420, overflowY:'auto' }}>
            {(!systemSets||systemSets.length===0) ? (
              <div style={{ textAlign:'center', padding:60, color:'var(--muted)', fontSize:13 }}>
                No system collections available yet.<br/>Load a question file first.
              </div>
            ) : systemSets.map(sset => (
              <div key={sset.id} style={{ marginBottom:20 }}>
                <div style={{ fontSize:11, fontWeight:800, textTransform:'uppercase', letterSpacing:'.08em',
                  color:'var(--primary)', marginBottom:8, display:'flex', alignItems:'center', gap:6 }}>
                  {sset.name}
                  <span style={{ fontWeight:400, fontSize:10, color:'var(--muted)' }}>({sset.colls.length} collections · auto-generated)</span>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:5 }}>
                  {sset.colls.map(c => {
                    const already = colls.some(x => x.name === c.name);
                    return (
                      <div key={c.id} style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 10px',
                        background:'var(--card2)', border:'1px solid var(--border)', borderRadius:8 }}>
                        <div style={{ width:10, height:10, borderRadius:'50%', background:c.color, flexShrink:0 }}/>
                        <span style={{ flex:1, fontSize:13, fontWeight:600 }}>{c.name}</span>
                        <span style={{ fontSize:11, color:'var(--muted)', fontFamily:'var(--mono)' }}>{c.qIds.length} q</span>
                        <button className="btn" style={{ fontSize:11, padding:'3px 10px', opacity: already?.7:1 }}
                          title={already ? 'Already cloned to My Collections' : 'Clone into My Collections'}
                          onClick={() => {
                            if (already) return;
                            const id = Date.now().toString();
                            const cloned = { id, name:c.name, color:c.color, qIds:[...c.qIds],
                              queries:[{ text:`lesson:${c.name}`, mode:'add', ts:Date.now() }] };
                            setColls(prev=>[...prev, cloned]);
                            setActive(id);
                            setActiveTab2('mine');
                          }}>
                          {already ? '✓ Cloned' : '→ Clone'}
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ── TAB: PRESETS ── */}
        {activeTab2 === 'presets' && (
          <div style={{ minHeight:420, overflowY:'auto' }}>
            <div style={{ fontSize:11, color:'var(--muted)', marginBottom:14, lineHeight:1.6 }}>
              One-click collection templates based on your current progress. Clicking creates a new collection in <strong>My Collections</strong> and switches to it.
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
              {PRESETS.map(p => {
                const ids = p.fn();
                const already = colls.some(x => x.name === p.name);
                return (
                  <div key={p.name} style={{ padding:'12px 14px', borderRadius:10,
                    background:'var(--card2)', border:`1px solid var(--border2)`,
                    display:'flex', flexDirection:'column', gap:6 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <span style={{ fontSize:18 }}>{p.icon}</span>
                      <div style={{ flex:1 }}>
                        <div style={{ fontWeight:700, fontSize:13 }}>{p.name}</div>
                        <div style={{ fontSize:11, color:'var(--muted)' }}>{p.desc}</div>
                      </div>
                      <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:2 }}>
                        <span style={{ fontFamily:'var(--mono)', fontSize:13, fontWeight:700, color: p.color }}>{ids.length}</span>
                        <span style={{ fontSize:9, color:'var(--muted)' }}>questions</span>
                      </div>
                    </div>
                    <div style={{ display:'flex', gap:6 }}>
                      <button className="btn primary" style={{ flex:1, fontSize:11 }}
                        disabled={ids.length===0}
                        onClick={() => {
                          const id = Date.now().toString();
                          const entry = p.query ? [{ text:p.query, mode:'add', ts:Date.now() }] : [];
                          setColls(prev=>[...prev, { id, name:p.name, color:p.color, qIds:ids, queries:entry }]);
                          setActive(id); setActiveTab2('mine');
                        }}>
                        {ids.length===0 ? 'No matches' : already ? '+ Duplicate' : '+ Create'}
                      </button>
                      {already && (
                        <button className="btn" style={{ fontSize:11, padding:'4px 10px' }}
                          title="Refresh existing collection with latest data"
                          onClick={() => {
                            setColls(prev=>prev.map(c=>c.name!==p.name?c:{...c, qIds:ids}));
                            setActiveTab2('mine');
                          }}>
                          ↺ Refresh
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// ═══════════════════════════════ PRACTICE / EXAM MODE ═══════════════════════════════
function PracticeMode({ questions, mode, onClose, onRateSR, weakIds, onAddWrong, onMarkDone, onMarkWeak }) {
  const isExam = mode === 'exam';
  const isWrongReview = mode === 'wrong';
  const [deck] = useState(() => [...questions].sort(() => Math.random()-0.5));
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [shown, setShown] = useState(false);
  const [score, setScore] = useState({ correct:0, wrong:0, skipped:0 });
  const [done, setDone] = useState(false);
  const [examAnswers, setExamAnswers] = useState({}); // for exam: {qId: selected}
  const [examDone, setExamDone] = useState(false);
  // Timer
  const [timeLeft, setTimeLeft] = useState(isExam ? deck.length * 90 : 90); // exam: 90s/q total; practice: 90s/q
  const [timerActive, setTimerActive] = useState(true);
  const [sessionTime, setSessionTime] = useState(0);
  const timerRef = useRef(null);
  const sessionRef = useRef(null);

  useEffect(() => {
    sessionRef.current = setInterval(() => setSessionTime(t => t+1), 1000);
    return () => clearInterval(sessionRef.current);
  }, []);

  const [timerExpired, setTimerExpired] = useState(false);

  useEffect(() => {
    if (!timerActive || done || examDone) return;
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) {
          clearInterval(timerRef.current);
          setTimerExpired(true);
          return 0;
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [timerActive, idx, done, examDone]);

  // Handle timer expiry outside the setTimeLeft updater to avoid stale closures
  useEffect(() => {
    if (!timerExpired) return;
    setTimerExpired(false);
    if (isExam) setExamDone(true);
    else skip();
  }, [timerExpired]);

  const q = deck[idx];

  const answer = (char) => {
    if (isExam) {
      setExamAnswers(prev => ({...prev, [q.id]: char}));
      return;
    }
    if (selected) return;
    setSelected(char); setShown(true);
    const correct = char === q.answerKey?.toUpperCase();
    setScore(s => ({...s, correct:s.correct+(correct?1:0), wrong:s.wrong+(correct?0:1)}));
    if (correct) { onMarkDone(q.id); }
    else { onAddWrong(q.id); onMarkWeak(q.id); }
    clearInterval(timerRef.current);
  };

  const revealAnswer = () => {
    setShown(true);
    clearInterval(timerRef.current);
  };

  const rate = (quality) => {
    onRateSR(q.id, quality);
    next();
  };

  const next = () => {
    if (idx+1 >= deck.length) { setDone(true); return; }
    setIdx(i=>i+1); setSelected(null); setShown(false);
    setTimeLeft(isExam ? timeLeft : 90);
    setTimerActive(true);
  };
  const skip = () => { setScore(s=>({...s,skipped:s.skipped+1})); next(); };

  const submitExam = () => { setExamDone(true); clearInterval(timerRef.current); };

  // ── Practice / Exam keyboard shortcuts ──
  useEffect(() => {
    if (done || examDone) return;
    const onKey = e => {
      // Don't hijack text inputs
      const tag = document.activeElement?.tagName;
      if (tag==='INPUT'||tag==='TEXTAREA') return;

      // A–E → select answer option
      const letterMatch = e.key.match(/^[a-eA-E]$/);
      if (letterMatch) {
        const char = e.key.toUpperCase();
        const optIndex = char.charCodeAt(0) - 65; // 0-4
        if (q && q.options && optIndex < q.options.length) {
          answer(char);
        }
        return;
      }

      // Right arrow / Enter → next question (exam: always; practice: only after answered/shown)
      if (e.key==='ArrowRight' || (e.key==='Enter' && (isExam || shown))) {
        e.preventDefault();
        if (isExam) {
          if (idx+1 >= deck.length) submitExam();
          else next();
        } else if (shown) {
          // In practice mode after answer shown, Enter/Right = "Good" SR rating
          rate(2);
        }
        return;
      }

      // Left arrow → go to previous question (exam only — practice is linear)
      if (e.key==='ArrowLeft' && isExam) {
        e.preventDefault();
        if (idx > 0) {
          setIdx(i=>i-1); setSelected(null); setShown(false);
          setTimerActive(true);
        }
        return;
      }

      // Space → reveal answer (practice mode, no options / not yet shown)
      if (e.key===' ' && !isExam && !shown) {
        e.preventDefault();
        if (!q.options || q.options.length===0) revealAnswer();
        else if (!selected) skip();
        return;
      }

      // Escape → close
      if (e.key==='Escape') { onClose(); return; }

      // 1–4 → SR rating (practice, after answer shown)
      if (!isExam && shown) {
        if (e.key==='1') { rate(0); return; }
        if (e.key==='2') { rate(1); return; }
        if (e.key==='3') { rate(2); return; }
        if (e.key==='4') { rate(3); return; }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [q, idx, selected, shown, done, examDone, isExam]);

  // Exam results — apply done/weak on first render
  const examApplied = useRef(false);
  if (examDone && !examApplied.current) {
    examApplied.current = true;
    deck.forEach(q => {
      const isCorrect = examAnswers[q.id]?.toUpperCase() === q.answerKey?.toUpperCase();
      if (isCorrect) onMarkDone(q.id);
      else if (examAnswers[q.id]) { onAddWrong(q.id); onMarkWeak(q.id); }
    });
  }

  if (examDone) {
    let correct=0;
    deck.forEach(q => { if(examAnswers[q.id]?.toUpperCase()===q.answerKey?.toUpperCase()) correct++; });
    const pct = Math.round((correct/deck.length)*100);
    return (
      <div className="modal-bg">
        <div className="modal" style={{textAlign:'center',maxWidth:520}}>
          <div style={{fontSize:40,marginBottom:8}}>{pct>=80?'🎉':pct>=60?'👍':'💪'}</div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>Exam Complete</div>
          <div style={{color:'var(--muted)',marginBottom:20}}>{deck.length} questions · {Math.floor(sessionTime/60)}:{String(sessionTime%60).padStart(2,'0')} elapsed</div>
          <div style={{fontSize:40,fontWeight:800,color:pct>=80?'var(--green)':pct>=60?'var(--yellow)':'var(--red)',marginBottom:20}}>{pct}%</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}}>
            <div className="stat-card" style={{alignItems:'center'}}><div className="stat-num" style={{color:'var(--green)'}}>{correct}</div><div className="stat-label">Correct ✓ Done</div></div>
            <div className="stat-card" style={{alignItems:'center'}}><div className="stat-num" style={{color:'var(--red)'}}>{deck.length-correct}</div><div className="stat-label">Wrong ⚡ Weak</div></div>
            <div className="stat-card" style={{alignItems:'center'}}><div className="stat-num">{Object.keys(examAnswers).length}</div><div className="stat-label">Answered</div></div>
          </div>
          {/* Detailed results */}
          <div style={{maxHeight:220,overflowY:'auto',textAlign:'left',marginBottom:16}}>
            {deck.map((q,i) => {
              const sel = examAnswers[q.id]; const correct2 = sel?.toUpperCase()===q.answerKey?.toUpperCase();
              return (
                <div key={q.id} style={{padding:'6px 10px',borderRadius:6,marginBottom:4,background:correct2?'var(--gg)':'var(--rg)',border:`1px solid ${correct2?'var(--green)':'var(--red)'}`,fontSize:12,display:'flex',gap:8,alignItems:'flex-start'}}>
                  <span style={{fontFamily:'var(--mono)',flexShrink:0,fontWeight:700,color:correct2?'var(--green)':'var(--red)'}}>{correct2?'✓':'✗'}</span>
                  <span style={{flex:1,lineHeight:1.4}}>{q.question.slice(0,60)}{q.question.length>60?'…':''}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:11,flexShrink:0,color:correct2?'var(--green)':'var(--red)'}}>{sel||'—'} / {q.answerKey}</span>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:12}}>✓ Correct → marked <b>Done</b> &nbsp;·&nbsp; ✗ Wrong → marked <b>Weak</b></div>
          <div style={{display:'flex',gap:10,justifyContent:'center'}}>
            <button className="btn" onClick={onClose}>Exit</button>
          </div>
        </div>
      </div>
    );
  }

  // Practice done screen
  if (done) {
    const total = score.correct+score.wrong+score.skipped;
    const pct = Math.round((score.correct/Math.max(1,total))*100);
    return (
      <div className="modal-bg">
        <div className="modal" style={{textAlign:'center',maxWidth:480}}>
          <div style={{fontSize:40,marginBottom:8}}>{pct>=80?'🎉':pct>=50?'👍':'💪'}</div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>Session Complete!</div>
          <div style={{color:'var(--muted)',marginBottom:20}}>{Math.floor(sessionTime/60)}m {sessionTime%60}s studied</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
            <div className="stat-card" style={{alignItems:'center'}}><div className="stat-num" style={{color:'var(--green)'}}>{score.correct}</div><div className="stat-label">Correct</div></div>
            <div className="stat-card" style={{alignItems:'center'}}><div className="stat-num" style={{color:'var(--red)'}}>{score.wrong}</div><div className="stat-label">Wrong</div></div>
            <div className="stat-card" style={{alignItems:'center'}}><div className="stat-num" style={{color:'var(--muted)'}}>{score.skipped}</div><div className="stat-label">Skipped</div></div>
          </div>
          <div style={{fontSize:36,fontWeight:800,color:pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)',marginBottom:16}}>{pct}%</div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:16}}>✓ Correct answers → marked <b style={{color:'var(--green)'}}>Done</b> &nbsp;·&nbsp; ✗ Wrong answers → marked <b style={{color:'var(--red)'}}>Weak</b></div>
          <button className="btn" onClick={onClose}>Close</button>
        </div>
      </div>
    );
  }

  // Exam in progress
  if (isExam) {
    const answered = Object.keys(examAnswers).length;
    return (
      <div className="modal-bg">
        <div className="modal" style={{maxWidth:640}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:14}}>📝 Exam — Q{idx+1}/{deck.length}</div>
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <span style={{fontFamily:'var(--mono)',fontSize:13,color:timeLeft<60?'var(--red)':'var(--muted)'}}>{Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}</span>
              <span style={{fontSize:12,color:'var(--muted)'}}>{answered}/{deck.length} answered</span>
              <button className="btn primary" onClick={submitExam}>Submit</button>
              <button className="btn ghost" onClick={onClose}><I.X s={15}/></button>
            </div>
          </div>
          <div className="pb" style={{marginBottom:16}}><div className="pb-fill" style={{width:`${((idx)/deck.length)*100}%`,background:'var(--primary)'}}/></div>
          <div style={{fontSize:15,fontWeight:500,lineHeight:1.6,marginBottom:16}}>{q.question}</div>
          {q.options && q.options.length>0 && (
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
              {q.options.map((opt,i) => {
                const char=String.fromCharCode(65+i);
                const sel=examAnswers[q.id]===char;
                return (
                  <button key={i} className="quiz-btn" onClick={()=>answer(char)} style={{borderColor:sel?'var(--primary)':'var(--border2)',background:sel?'var(--pg)':'var(--card2)',color:sel?'var(--primary)':'var(--text)'}}>
                    <span style={{fontFamily:'var(--mono)',fontWeight:700,marginRight:8}}>{char}.</span>{opt}
                  </button>
                );
              })}
            </div>
          )}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <button className="btn" onClick={()=>{setIdx(i=>Math.max(0,i-1));setSelected(null);setShown(false);}}>← Back</button>
            <span style={{fontSize:10,color:'var(--muted)',fontFamily:'var(--mono)'}}>A–E answer &nbsp;·&nbsp; ← → navigate &nbsp;·&nbsp; Esc close</span>
            <button className="btn primary" onClick={()=>{ if(idx+1>=deck.length)submitExam(); else {setIdx(i=>i+1);setSelected(null);setShown(false);} }}>{idx+1>=deck.length?'Submit':'Next →'}</button>
          </div>
        </div>
      </div>
    );
  }

  // Practice in progress
  const timerPct = (timeLeft/90)*100;
  const circumference = 2*Math.PI*20;
  const dashOffset = circumference*(1-timerPct/100);

  return (
    <div className="modal-bg">
      <div className="modal" style={{maxWidth:600}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:14}}>
            {isWrongReview?'❌ Wrong Review':'🧠 Practice'} — {idx+1}/{deck.length}
            {weakIds.has(q.id) && <span style={{marginLeft:8}} className="tag-chip weak">Weak Spot</span>}
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <span style={{fontSize:12,color:'var(--green)',fontWeight:600}}>✓ {score.correct}</span>
            <span style={{fontSize:12,color:'var(--red)',fontWeight:600}}>✗ {score.wrong}</span>
            {/* Circular timer */}
            <svg width="44" height="44" style={{flexShrink:0}}>
              <circle cx="22" cy="22" r="20" fill="none" stroke="var(--border2)" strokeWidth="3"/>
              <circle cx="22" cy="22" r="20" fill="none" stroke={timeLeft<20?'var(--red)':timeLeft<45?'var(--yellow)':'var(--primary)'}
                strokeWidth="3" strokeDasharray={circumference} strokeDashoffset={dashOffset}
                strokeLinecap="round" style={{transform:'rotate(-90deg)',transformOrigin:'22px 22px',transition:'stroke-dashoffset .5s'}}/>
              <text x="22" y="27" textAnchor="middle" fontSize="12" fontFamily="var(--mono)" fill="var(--text)">{timeLeft}</text>
            </svg>
            <button className="btn ghost" onClick={onClose} style={{padding:'4px 8px'}}><I.X s={15}/></button>
          </div>
        </div>

        <div className="pb" style={{marginBottom:16}}><div className="pb-fill" style={{width:`${(idx/deck.length)*100}%`,background:'var(--primary)'}}/></div>
        <div style={{fontSize:15,fontWeight:500,lineHeight:1.6,marginBottom:16}}>{q.question}</div>

        {q.options && q.options.length>0 ? (
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
            {q.options.map((opt,i) => {
              const char=String.fromCharCode(65+i);
              const isCorrect=q.answerKey&&char===q.answerKey;
              const isSel=isExam?(examAnswers[q.id]===char):(selected===char);
              let cls='';
              if(!isExam&&shown&&isCorrect) cls='correct';
              else if(!isExam&&shown&&isSel&&!isCorrect) cls='wrong';
              else if(isExam&&isSel) cls=''; // highlight exam selection without revealing answer
              const isDisabled=!isExam&&!!selected;
              return <button key={i} className={`quiz-btn ${cls}`}
                style={isExam&&isSel?{borderColor:'var(--primary)',background:'var(--pg)',color:'var(--primary)'}:{}}
                onClick={()=>answer(char)} disabled={isDisabled}>
                <span style={{fontFamily:'var(--mono)',fontWeight:700,marginRight:8}}>{char}.</span>{opt}
              </button>;
            })}
          </div>
        ) : (
          !shown && <button className="btn primary" style={{marginBottom:16}} onClick={revealAnswer}>Reveal Answer</button>
        )}

        {shown && (
          <>
            {(!q.options||q.options.length===0) && (
              <div style={{padding:'10px 14px',background:'var(--gg)',border:'1px solid var(--green)',borderRadius:8,color:'var(--green)',marginBottom:12,fontSize:13}}>
                <b>Answer:</b> {q.answerKey?q.answerKey+' — ':''}{q.answerText}
              </div>
            )}
            {q.explanation && (
              <div style={{borderLeft:'3px solid var(--primary)',paddingLeft:12,fontSize:12,color:'var(--muted)',marginBottom:14,lineHeight:1.6}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--primary)',marginBottom:2}}>Explanation</div>
                {q.explanation}
              </div>
            )}
            {/* Confidence / SR rating */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',marginBottom:6,letterSpacing:'.08em'}}>How well did you know this?</div>
              <div style={{display:'flex',gap:6}}>
                <button className="conf-btn again" onClick={()=>rate(0)} title="Shortcut: 1">Again<br/><span style={{fontSize:10,opacity:.7}}>(&lt;1d)</span></button>
                <button className="conf-btn hard" onClick={()=>rate(1)} title="Shortcut: 2">Hard<br/><span style={{fontSize:10,opacity:.7}}>(~1d)</span></button>
                <button className="conf-btn good" onClick={()=>rate(2)} title="Shortcut: 3">Good<br/><span style={{fontSize:10,opacity:.7}}>(6d)</span></button>
                <button className="conf-btn easy" onClick={()=>rate(3)} title="Shortcut: 4">Easy<br/><span style={{fontSize:10,opacity:.7}}>({q.id&&'+'}long)</span></button>
              </div>
            </div>
          </>
        )}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,marginTop:8}}>
          <span style={{fontSize:10,color:'var(--muted)',fontFamily:'var(--mono)'}}>
            {shown ? '1–4 rate · → / Enter next' : 'A–E answer · Space skip · Esc close'}
          </span>
          <div style={{display:'flex',gap:8}}>
            {!isExam && !shown && q.options && q.options.length>0 && (
              <button className="btn" onClick={skip}>Skip</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════ REPORT ═══════════════════════════════
function ReportModal({ questions, favIds, completedIds, notes, srData, weakIds, sessions, streak, onClose }) {
  const total = questions.length, done = completedIds.size;
  const pct = total>0?Math.round((done/total)*100):0;
  const due = questions.filter(q=>isDue(srData[q.id])).length;
  const weak = weakIds.size;
  const noted = Object.values(notes).filter(n=>n&&n.trim()).length;

  const lessonMap = {};
  questions.forEach(q=>{
    if(!lessonMap[q.lesson]) lessonMap[q.lesson]={total:0,done:0};
    lessonMap[q.lesson].total++;
    if(completedIds.has(q.id)) lessonMap[q.lesson].done++;
  });
  const lessons = Object.entries(lessonMap).sort((a,b)=>b[1].total-a[1].total);

  const tagMap = {};
  questions.forEach(q=>{ if(q.tag){if(!tagMap[q.tag])tagMap[q.tag]=0; tagMap[q.tag]++;} });
  const tags = Object.entries(tagMap).sort((a,b)=>b[1]-a[1]).slice(0,12);

  const totalSessionSec = sessions.reduce((a,s)=>a+(s.duration||0),0);
  const avgSession = sessions.length>0?Math.round(totalSessionSec/sessions.length):0;

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:700}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontWeight:800,fontSize:17}}>📊 Study Report</div>
          <button className="btn ghost" onClick={onClose}><I.X s={15}/></button>
        </div>

        {/* Stats grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:8,marginBottom:20}}>
          {[
            [total,'Total','var(--text)'],[done,'Done','var(--green)'],[total-done,'Unsolved','var(--yellow)'],
            [due,'SR Due','var(--purple)'],[weak,'Weak','var(--red)'],[favIds.size,'Favorites','var(--yellow)'],
            [noted,'Notes','var(--primary)'],[streak,'Day Streak','var(--yellow)'],[sessions.length,'Sessions','var(--muted)']
          ].map(([n,l,c])=>(
            <div key={l} className="stat-card" style={{alignItems:'center'}}>
              <div className="stat-num" style={{color:c}}>{n}</div>
              <div className="stat-label">{l}</div>
            </div>
          ))}
        </div>

        {/* Progress bar */}
        <div style={{marginBottom:8,display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--muted)'}}>
          <span>Overall Progress</span><span style={{fontFamily:'var(--mono)'}}>{pct}%</span>
        </div>
        <div className="pb" style={{marginBottom:20}}>
          <div className="pb-fill" style={{width:`${pct}%`,background:pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--primary)'}}/>
        </div>

        {/* Session time */}
        {sessions.length>0 && (
          <div style={{marginBottom:20,display:'flex',gap:12,flexWrap:'wrap'}}>
            <span style={{fontSize:13,color:'var(--muted)'}}><I.Clock/> Total study time: <b style={{color:'var(--text)'}}>{Math.floor(totalSessionSec/3600)}h {Math.floor((totalSessionSec%3600)/60)}m</b></span>
            <span style={{fontSize:13,color:'var(--muted)'}}>Avg session: <b style={{color:'var(--text)'}}>{Math.floor(avgSession/60)}m {avgSession%60}s</b></span>
          </div>
        )}

        {/* Lesson breakdown */}
        {lessons.length>0 && (
          <div style={{marginBottom:20}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',marginBottom:8}}>Lesson Breakdown</div>
            <div style={{maxHeight:200,overflowY:'auto'}}>
              <table className="rt">
                <thead><tr><th>Lesson</th><th>Total</th><th>Done</th><th style={{width:120}}>Progress</th></tr></thead>
                <tbody>{lessons.map(([l,d])=>{
                  const p=Math.round((d.done/d.total)*100);
                  return (
                    <tr key={l}>
                      <td style={{fontSize:12,maxWidth:200}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={l}>{l.length>40?l.slice(0,40)+'…':l}</div></td>
                      <td style={{fontFamily:'var(--mono)',fontSize:12,textAlign:'center'}}>{d.total}</td>
                      <td style={{fontFamily:'var(--mono)',fontSize:12,textAlign:'center',color:'var(--green)'}}>{d.done}</td>
                      <td><div style={{display:'flex',alignItems:'center',gap:6}}><div className="pb" style={{flex:1}}><div className="pb-fill" style={{width:`${p}%`,background:p===100?'var(--green)':'var(--primary)'}}/></div><span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--muted)',minWidth:28}}>{p}%</span></div></td>
                    </tr>
                  );
                })}</tbody>
              </table>
            </div>
          </div>
        )}

        {/* Tags */}
        {tags.length>0 && (
          <div style={{marginBottom:20}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',marginBottom:8}}>Top Tags</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {tags.map(([tag,count])=>(
                <span key={tag} className="tag-chip"><I.Tag/>{tag} <span style={{fontFamily:'var(--mono)',color:'var(--primary)'}}>×{count}</span></span>
              ))}
            </div>
          </div>
        )}

        <button className="btn" onClick={()=>{
          let t=`QnA Hub Report\n${'='.repeat(40)}\n\nTotal: ${total}\nDone: ${done} (${pct}%)\nSR Due: ${due}\nWeak: ${weak}\nStreak: ${streak} days\n\nLessons:\n`;
          lessons.forEach(([l,d])=>t+=`  ${l}: ${d.done}/${d.total}\n`);
          navigator.clipboard?.writeText(t).then(()=>alert('Copied!'));
        }}><I.Copy/> Copy Report</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════ TAG EDITOR MODAL ═══════════════════════════════
function TagEditModal({ qId, question, currentTag, onSave, onClose, allQuestions, copiedTags, showToast }) {
  const [newTags, setNewTags] = useState(''); // ✓ CHANGED: Only for NEW tags, not editing
  const [inputValue, setInputValue] = useState('');
  const [searchValue, setSearchValue] = useState('');
  const [sortByCount, setSortByCount] = useState(true);
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [addedTags, setAddedTags] = useState([]);

  // Current tags (display only - cannot edit)
  const currentTags = typeof currentTag === 'string' && currentTag.trim() 
    ? currentTag.split('|').map(t => t.trim()).filter(t => t)
    : [];

  // Get all tags from questions with their counts
  const tagStats = {};
  allQuestions?.forEach(q => {
    if (q.tags && Array.isArray(q.tags)) {
      q.tags.forEach(tag => {
        if (!currentTags.includes(tag) && !addedTags.includes(tag)) { // Don't suggest already added tags
          tagStats[tag] = (tagStats[tag] || 0) + 1;
        }
      });
    }
  });

  // Filter and sort suggestions
  const suggestions = Object.entries(tagStats)
    .filter(([tag]) => !addedTags.includes(tag) && tag.toLowerCase().includes(searchValue.toLowerCase()))
    .sort((a, b) => sortByCount ? b[1] - a[1] : a[0].localeCompare(b[0]))
    .slice(0, 15);

  const addTag = (tag = inputValue.trim()) => {
    if (tag && !addedTags.includes(tag) && !currentTags.includes(tag)) {
      setAddedTags([...addedTags, tag]);
      setInputValue('');
      setSearchValue('');
    }
  };

  const removeNewTag = (idx) => {
    setAddedTags(addedTags.filter((_, i) => i !== idx));
  };

  const save = () => {
    if (addedTags.length > 0) {
      const allTags = [...currentTags, ...addedTags];
      onSave(qId, allTags.join(' | '));
      showToast?.(`✓ Added ${addedTags.length} tag${addedTags.length !== 1 ? 's' : ''}`);
    }
    onClose();
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:600}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:14}}>🏷 Add Tags — Q{qId}</div>
          <button className="btn ghost" onClick={onClose} style={{padding:'4px 8px'}}>✕</button>
        </div>
        <div style={{color:'var(--muted)',fontSize:12,marginBottom:12}}>{question.slice(0,80)}{question.length>80?'…':''}</div>
        
        {/* Current tags - READ ONLY DISPLAY */}
        {currentTags.length > 0 && (
          <div style={{marginBottom:14, padding:'12px', background:'var(--card2)', borderRadius:'var(--rs)', border:'1px solid var(--border)'}}>
            <div style={{color:'var(--muted)',fontSize:10,marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.5px'}}>📌 Existing Tags (Read-only)</div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
              {currentTags.map((tag, idx) => (
                <span key={idx} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 12px',background:'var(--primary)',color:'white',borderRadius:'var(--rs)',fontSize:12,fontWeight:500}}>
                  {tag}
                </span>
              ))}
            </div>
          </div>
        )}

        {/* New tags being added */}
        {addedTags.length > 0 && (
          <div style={{marginBottom:14, padding:'12px', background:'var(--gg)', borderRadius:'var(--rs)', border:'1px solid var(--green)'}}>
            <div style={{color:'var(--green)',fontSize:10,marginBottom:8,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.5px'}}>✓ New Tags To Add ({addedTags.length})</div>
            <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
              {addedTags.map((tag, idx) => (
                <span key={idx} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 12px',background:'var(--green)',color:'white',borderRadius:'var(--rs)',fontSize:12,fontWeight:500}}>
                  {tag}
                  <button onClick={() => removeNewTag(idx)} style={{background:'none',border:'none',color:'white',cursor:'pointer',fontSize:14,padding:0,lineHeight:1}}>×</button>
                </span>
              ))}
            </div>
          </div>
        )}

        {/* Input section */}
        <div style={{display:'flex',gap:4,marginBottom:12}}>
          <input 
            className="input" 
            value={inputValue} 
            onChange={e=>{setInputValue(e.target.value);setShowSuggestions(true);}} 
            placeholder="Type new tag to add..." 
            onKeyDown={e=>{
              if(e.key==='Enter') { e.preventDefault(); addTag(); }
              if(e.key===' ') { e.preventDefault(); addTag(); }
            }}
            style={{flex:1}}
            autoFocus
          />
          <button className="btn primary" onClick={() => addTag()} style={{padding:'6px 12px'}}>+ Add</button>
        </div>

        {/* Suggestions section */}
        {(showSuggestions || searchValue) && (
          <div style={{marginBottom:12,padding:12,background:'var(--card2)',borderRadius:'var(--rs)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase'}}>Suggestions ({suggestions.length})</div>
              <div style={{display:'flex',gap:4}}>
                <button 
                  onClick={() => setSortByCount(!sortByCount)} 
                  style={{fontSize:10,padding:'2px 6px',background:sortByCount?'var(--primary)':'var(--border2)',color:sortByCount?'white':'var(--muted)',border:'none',borderRadius:3,cursor:'pointer'}}
                >
                  {sortByCount ? '🔢 Count' : '📝 A-Z'}
                </button>
              </div>
            </div>
            
            <input 
              className="input" 
              value={searchValue} 
              onChange={e => setSearchValue(e.target.value)} 
              placeholder="Search available tags..." 
              style={{marginBottom:8,fontSize:12}}
            />

            <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
              {suggestions.length === 0 ? (
                <span style={{fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>No matching tags</span>
              ) : (
                suggestions.map(([tag, count]) => (
                  <button
                    key={tag}
                    onClick={() => { addTag(tag); setSearchValue(''); }}
                    style={{
                      fontSize:11,
                      padding:'4px 8px',
                      background:'var(--border2)',
                      color:'var(--muted)',
                      border:'1px solid var(--border)',
                      borderRadius:4,
                      cursor:'pointer',
                      display:'flex',
                      alignItems:'center',
                      gap:4,
                      transition:'all 0.2s'
                    }}
                    onMouseOver={e => {e.target.style.background = 'var(--primary)'; e.target.style.color = 'white';}}
                    onMouseOut={e => {e.target.style.background = 'var(--border2)'; e.target.style.color = 'var(--muted)';}}
                  >
                    {tag}
                    <span style={{fontSize:10,opacity:0.7}}>({count})</span>
                  </button>
                ))
              )}
            </div>
          </div>
        )}

        <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'flex-end'}}>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={save} disabled={addedTags.length === 0}>
            {addedTags.length === 0 ? '(No new tags)' : `✓ Add ${addedTags.length} Tag${addedTags.length !== 1 ? 's' : ''}`}
          </button>
        </div>

        <div style={{marginTop:12, padding:'8px 12px', background:'var(--card2)', borderRadius:'var(--rs)', fontSize:11, color:'var(--muted)', borderLeft:'3px solid var(--yellow)'}}>
          ℹ️ <strong>Add Only:</strong> You can add new tags to this question, but cannot modify existing tags. To remove tags, use the question editor directly.
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════ STREAK HEATMAP ═══════════════════════════════
function StreakHeatmap({ sessions }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const days = [];
  for (let i=89; i>=0; i--) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    days.push(d.toDateString());
  }
  const sessionDays = new Set(sessions.map(s=>new Date(s.date).toDateString()));
  const weeks = [];
  for (let i=0; i<days.length; i+=7) weeks.push(days.slice(i,i+7));

  return (
    <div style={{display:'flex',gap:3}}>
      {weeks.map((week,wi)=>(
        <div key={wi} style={{display:'flex',flexDirection:'column',gap:3}}>
          {week.map(day=>{
            const active=sessionDays.has(day);
            const isToday=day===today.toDateString();
            return (
              <div key={day} title={day} className="heat-cell" style={{
                background:active?'var(--green)':'var(--card2)',
                border:isToday?'1px solid var(--primary)':'1px solid transparent',
                opacity:active?1:0.5
              }}/>
            );
          })}
        </div>
      ))}
    </div>
  );
}
